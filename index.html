<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#faf3e8">
<title>Mein Leben</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#faf3e8;--card:#fffdf8;--text:#2e2010;--muted:rgba(46,32,16,0.5);
  --gold:#c8943a;--gold-light:#e8c97a;--sage:#7a9a5a;--sage-light:#b8d09a;
  --rose:#c07060;--terra:#c4704a;--border:rgba(180,130,70,0.18);--shadow:rgba(160,100,30,0.10);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:26px;}
body{background:var(--bg);font-family:"Cormorant Garamond",Georgia,serif;color:var(--text);min-height:100vh;padding-bottom:5rem;
  background-image:radial-gradient(ellipse at 10% 0%,rgba(200,148,58,0.08) 0%,transparent 60%),
                   radial-gradient(ellipse at 90% 100%,rgba(122,154,90,0.07) 0%,transparent 60%);}

/* ── HEADER ── */
header{padding:1.4rem 1.2rem 1rem;border-bottom:1px solid var(--border);}
.date-line{font-size:16px;color:var(--muted);letter-spacing:.08em;margin-bottom:.3rem;}
.goal-text{font-family:"Playfair Display",serif;font-size:24px;font-style:italic;color:var(--text);line-height:1.5;}

/* ── INTENTION ── */
.intention-wrap{margin:1rem 1rem 0;background:var(--card);border-radius:20px;border:1.5px solid var(--border);box-shadow:0 4px 20px var(--shadow);overflow:hidden;}
.intention-top{padding:.9rem 1.1rem .5rem;display:flex;align-items:center;gap:.5rem;}
.intention-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:pulse 3s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
.intention-label{font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);}
.intention-text{padding:.2rem 1.1rem 1rem;font-family:"Playfair Display",serif;font-size:27px;font-style:italic;color:var(--text);line-height:1.5;min-height:56px;}
.intention-text.loading{color:var(--muted);font-size:22px;font-family:"Cormorant Garamond",serif;}
.intention-refresh{display:flex;align-items:center;justify-content:flex-end;padding:.2rem 1.1rem .7rem;}
.refresh-btn{font-size:18px;font-style:italic;color:var(--muted);background:none;border:none;cursor:pointer;font-family:"Cormorant Garamond",serif;opacity:.7;}
.refresh-btn:hover{opacity:1;color:var(--gold);}

/* ── RHYTHMUS ── */
.rhythmus-wrap{margin:.8rem 1rem 0;}
.rhythmus-label{font-size:15px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;padding-left:.2rem;}
.waves{display:flex;gap:.3rem;}
.wave{flex:1;background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:.6rem .3rem;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden;}
.wave.active{border-color:var(--gold);box-shadow:0 2px 16px rgba(200,148,58,0.15);}
.wave.active::before{content:'';position:absolute;inset:0;background:rgba(200,148,58,0.04);}
.wave-icon{font-size:1.1rem;margin-bottom:.2rem;}
.wave-name{font-size:14px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.wave.active .wave-name{color:var(--gold);}
.wave-time{font-size:15px;color:var(--muted);font-style:italic;margin-top:.1rem;}

/* ── PHASE CONTENT ── */
.phase-content{margin:.6rem 1rem 0;animation:fadeIn .35s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.phase-card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);box-shadow:0 3px 14px var(--shadow);padding:.8rem 1rem;}
.phase-mood{font-size:20px;font-style:italic;color:var(--muted);line-height:1.65;margin-bottom:.7rem;padding-bottom:.7rem;border-bottom:1px solid var(--border);}

/* Aufgaben — sanft, fast unsichtbar */
.task-item{display:flex;align-items:flex-start;gap:.6rem;padding:.5rem .2rem;border-bottom:1px solid rgba(180,130,70,0.1);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .2s;}
.task-item:last-child{border-bottom:none;}
.task-item.done{opacity:.3;}
.task-item.done .task-name{text-decoration:line-through;text-decoration-color:rgba(200,148,58,0.4);}
.task-check{width:16px;height:16px;border-radius:50%;border:1px solid rgba(180,130,70,0.4);flex-shrink:0;margin-top:2px;transition:all .2s;}
.task-item.done .task-check{background:var(--sage-light);border-color:var(--sage-light);}
.task-name{font-size:21px;color:var(--text);line-height:1.35;font-weight:300;}
.task-note{font-size:16px;font-style:italic;color:var(--muted);margin-top:1px;}
.task-cat{font-size:14px;letter-spacing:.1em;text-transform:uppercase;margin-left:auto;flex-shrink:0;padding-top:3px;opacity:.5;}
.task-links{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.35rem;}
.task-link{font-size:13px;font-style:italic;color:var(--gold);text-decoration:none;background:rgba(200,148,58,0.08);border:1px solid rgba(200,148,58,0.2);border-radius:10px;padding:.1rem .5rem;white-space:nowrap;}
.task-link:active{background:rgba(200,148,58,0.18);}

/* ── APPS ── */
.section-wrap{margin:1rem 1rem 0;}
.section-label{font-size:15px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;padding-left:.2rem;}
.app-group{margin-bottom:.9rem;}
.app-group-title{font-size:18px;color:var(--gold);font-style:italic;margin-bottom:.35rem;padding-left:.2rem;}
.al{display:flex;align-items:center;gap:.65rem;padding:.6rem .85rem;background:var(--card);border-radius:11px;margin-bottom:.4rem;text-decoration:none;color:var(--text);border:1px solid var(--border);transition:background .15s;}
.al:active{background:rgba(200,148,58,0.08);}
.al-icon{font-size:1.2rem;}
.al-text{font-size:22px;font-weight:400;flex:1;}
.al-sub{font-size:18px;color:var(--muted);font-style:italic;}
.al-arr{color:var(--gold-light);font-size:.85rem;margin-left:auto;}

/* ── REFLEXION ── */
.reflex-wrap{margin:1rem 1rem 0;}
.reflex-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.5rem;}
.reflex-title{font-family:"Playfair Display",serif;font-size:26px;font-style:italic;color:var(--text);}
.reflex-toggle{font-size:18px;color:var(--gold);cursor:pointer;border:none;background:none;font-family:"Cormorant Garamond",serif;font-style:italic;}
.reflex-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:1rem 1.1rem;box-shadow:0 2px 10px var(--shadow);}
.reflex-leitfrage{font-size:21px;font-style:italic;color:var(--gold);margin-bottom:.7rem;line-height:1.5;}
.reflex-textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:.7rem .9rem;font-family:"Cormorant Garamond",serif;font-size:22px;color:var(--text);background:var(--bg);resize:none;min-height:100px;line-height:1.6;outline:none;}
.reflex-textarea:focus{border-color:var(--gold);}
.reflex-textarea::placeholder{color:var(--muted);font-style:italic;}
.reflex-row{display:flex;gap:.5rem;margin-top:.6rem;align-items:center;}
.reflex-save{background:var(--gold);color:#fff;border:none;border-radius:20px;padding:.4rem 1rem;font-size:21px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
.reflex-new{background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:20px;padding:.4rem .8rem;font-size:21px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
.reflex-saved{font-size:18px;color:var(--sage);font-style:italic;margin-left:auto;}
.reflex-entries{margin-top:.9rem;border-top:1px solid var(--border);padding-top:.8rem;display:flex;flex-direction:column;gap:.6rem;}
.reflex-entry-date{font-size:16px;color:var(--gold);letter-spacing:.08em;margin-bottom:.15rem;}
.reflex-entry-lf{font-size:18px;color:var(--muted);margin-bottom:.1rem;}
.reflex-entry-text{font-size:21px;font-style:italic;color:var(--text);line-height:1.6;}

/* ── INNERE PRAXIS OVERLAY ── */
#praxis-overlay{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:2rem 1.5rem;
  animation:overlayIn .5s ease;
}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
#praxis-overlay.leaving{animation:overlayOut .4s ease forwards;}
@keyframes overlayOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-12px)}}

.praxis-tradition{
  font-size:12px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--gold);margin-bottom:1.2rem;opacity:.8;
}
.praxis-text{
  font-family:"Playfair Display",serif;font-size:26px;font-style:italic;
  color:var(--text);line-height:1.65;text-align:center;
  margin-bottom:1.6rem;max-width:320px;
}
.praxis-uebung{
  font-family:"Cormorant Garamond",serif;font-size:18px;font-style:italic;
  color:var(--muted);line-height:1.7;text-align:center;
  margin-bottom:2rem;max-width:300px;
  padding:.8rem 1rem;
  background:rgba(122,154,90,0.07);
  border-left:2px solid var(--sage);
  border-radius:0 12px 12px 0;
}
.praxis-weiter{
  background:transparent;border:1.5px solid var(--border);
  color:var(--muted);border-radius:30px;
  padding:.55rem 1.4rem;font-size:18px;
  font-family:"Cormorant Garamond",serif;font-style:italic;
  cursor:pointer;transition:all .2s;
}
.praxis-weiter:active{background:rgba(200,148,58,0.08);border-color:var(--gold);color:var(--gold);}
.praxis-deko{
  font-size:2.2rem;margin-bottom:1.4rem;opacity:.7;
}

/* ── LEBEN-TOAST beim Abhaken ── */
#leben-toast{
  position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1.5px solid var(--border);
  border-radius:20px;padding:.55rem 1.2rem;
  font-family:"Cormorant Garamond",serif;font-size:18px;font-style:italic;
  color:var(--gold);box-shadow:0 4px 20px var(--shadow);
  opacity:0;transition:opacity .3s,transform .3s;
  pointer-events:none;white-space:nowrap;z-index:500;
}
#leben-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* Glow-Animation auf der Task-Karte */
@keyframes cardGlow{
  0%{box-shadow:0 3px 14px var(--shadow);}
  40%{box-shadow:0 0 0 3px rgba(200,148,58,0.18),0 4px 20px rgba(200,148,58,0.12);}
  100%{box-shadow:0 3px 14px var(--shadow);}
}
.phase-card.glow{animation:cardGlow 1.2s ease;}
</style>
</head>
<body>

<!-- INNERE PRAXIS OVERLAY -->
<div id="praxis-overlay">
  <div class="praxis-tradition" id="praxis-tradition"></div>
  <div class="praxis-deko" id="praxis-deko"></div>
  <div class="praxis-text" id="praxis-text"></div>
  <div class="praxis-uebung" id="praxis-uebung"></div>
  <button class="praxis-weiter" onclick="closeOverlay()">weiter in den Tag →</button>
</div>

<!-- LEBEN TOAST -->
<div id="leben-toast"></div>

<header>
  <div class="date-line" id="dateLine"></div>
  <div style="font-family:'Playfair Display',serif;font-size:27px;font-style:italic;font-weight:600;color:var(--terra);line-height:1.45;">Ich will heute so leben, wie ich mein ganzes Leben leben will.</div>
  <div style="font-family:'Cormorant Garamond',serif;font-size:16px;font-style:italic;color:var(--muted);margin-top:.5rem;line-height:1.5;">Dieses Leben wähle ich — in fröhlicher Gelassenheit.</div>
</header>

<!-- INTENTION -->
<div class="intention-wrap">
  <div class="intention-top">
    <div class="intention-dot"></div>
    <div class="intention-label">Mein heutiger Impuls</div>
  </div>
  <div class="intention-text loading" id="intentionText">Einen Moment …</div>
  <div class="intention-refresh">
    <button class="refresh-btn" onclick="loadIntention(true)">↺ neuer Impuls</button>
  </div>
</div>

<!-- TAGES-RHYTHMUS -->
<div class="rhythmus-wrap">
  <div class="rhythmus-label">Mein Tag</div>
  <div class="waves">
    <div class="wave" id="wave-morgen" onclick="showPhase('morgen')">
      <div class="wave-icon">🌅</div>
      <div class="wave-name">Mo</div>
      <div class="wave-time">bis 9h</div>
    </div>
    <div class="wave" id="wave-vormittag" onclick="showPhase('vormittag')">
      <div class="wave-icon">☀️</div>
      <div class="wave-name">Vm</div>
      <div class="wave-time">9–12h</div>
    </div>
    <div class="wave" id="wave-mittag" onclick="showPhase('mittag')">
      <div class="wave-icon">🌿</div>
      <div class="wave-name">Mi</div>
      <div class="wave-time">12–15h</div>
    </div>
    <div class="wave" id="wave-nachmittag" onclick="showPhase('nachmittag')">
      <div class="wave-icon">🍂</div>
      <div class="wave-name">Nm</div>
      <div class="wave-time">15–18h</div>
    </div>
    <div class="wave" id="wave-abend" onclick="showPhase('abend')">
      <div class="wave-icon">🌙</div>
      <div class="wave-name">Ab</div>
      <div class="wave-time">ab 18h</div>
    </div>
  </div>
</div>

<div class="phase-content" id="phaseContent"></div>

<!-- APPS — phasenabhängig -->
<div class="section-wrap">
  <div class="section-label" id="apps-label">Jetzt passend</div>
  <div id="apps-list"></div>
  <button onclick="toggleAllApps()" id="alle-apps-btn" style="background:transparent;border:none;color:var(--muted);font-family:'Cormorant Garamond',serif;font-size:17px;font-style:italic;cursor:pointer;padding:.3rem .2rem;margin-top:.2rem;">alle Apps anzeigen ↓</button>
</div>

<!-- NOTIZEN -->
<div class="reflex-wrap" style="margin-top:.8rem;">
  <div class="reflex-header">
    <div class="reflex-title">✏️ Meine Notizen</div>
    <button class="reflex-toggle" onclick="clearNotiz()" id="notizClear" style="display:none">löschen</button>
  </div>
  <div class="reflex-card">
    <textarea class="reflex-textarea" id="notizText" placeholder="Was ich mir merken möchte …" oninput="saveNotiz()" style="min-height:80px;"></textarea>
  </div>
</div>

<!-- REFLEXION -->
<div class="reflex-wrap">
  <div class="reflex-header">
    <div class="reflex-title">🌿 Meine Gedanken</div>
    <button class="reflex-toggle" onclick="toggleReflexEntries()">Einträge anzeigen</button>
  </div>
  <div class="reflex-card">
    <div class="reflex-leitfrage" id="reflexLeitfrage"></div>
    <textarea class="reflex-textarea" id="reflexText" placeholder="Was bewegt dich gerade? Schreib einfach drauf los …"></textarea>
    <div class="reflex-row">
      <button class="reflex-save" onclick="saveReflex()">Speichern</button>
      <button class="reflex-new" onclick="newLeitfrage()">Andere Frage</button>
      <span class="reflex-saved" id="reflexSaved" style="display:none">✓ gespeichert</span>
    </div>
    <div class="reflex-entries" id="reflexEntries" style="display:none"></div>
  </div>
</div>

<script>
var DAYS_DE=["Sonntag","Montag","Dienstag","Mittwoch","Donnerstag","Freitag","Samstag"];
var MONTHS_DE=["Jänner","Februar","März","April","Mai","Juni","Juli","August","September","Oktober","November","Dezember"];
var today=new Date();

// ── DATUM ──
document.getElementById("dateLine").textContent=
  DAYS_DE[today.getDay()]+", "+today.getDate()+". "+MONTHS_DE[today.getMonth()]+" "+today.getFullYear();

// ── PHASEN ──
// links: Array von {href, label} — erscheinen als kleine Buttons beim Task
var PHASES={
  morgen:{
    mood:"Der Morgen gehört dir — noch vor allem anderen. Kein Lärm, kein Druck. Nur du, dein Tee, das Licht. Ich will diesen Morgen so leben, wie ich mein ganzes Leben leben will.",

      {name:"Euthyrox & Rückenübungen",note:"noch im Bett",cat:"körper"},

      {name:"Knirscherschiene raus",note:"spülen",cat:"körper"},

      {name:"Medikamente",note:"zum Frühstück",cat:"körper"},
      {name:"Rudi & Timmy",note:"Futter & Schmusezeit",cat:"tiere"},
      {name:"Bad Früh",note:"Weleda-Ritual",cat:"pflege",links:[{href:"Bad_Frueh.html",label:"Bad Früh"}]},
      {name:"Lotte raus",note:"erste Runde",cat:"tiere",links:[{href:"Lotte_Runden.html",label:"Routen"}]},
      {name:"Tiermedikamente",note:"Lotte + Rudi",cat:"tiere",links:[{href:"Medikamente_Tiere.html",label:"Medikamente"}]},
      {name:"Anulind",note:"Creme auftragen",cat:"pflege"},
    ]
  },
  vormittag:{
    mood:"Der Vormittag trägt dich in den Tag hinein — frisch, klar, lebendig. Ich will diesen Vormittag so leben, wie ich mein ganzes Leben leben will.",

      {name:"Hausverkauf",note:"einen Schritt weiter",cat:"arbeit",links:[{href:"hausverkauf-guide.html",label:"Guide"},{href:"Hausverkauf_Checkliste.html",label:"Checkliste"}]},
      {name:"Futter bestellen",note:"wenn nötig",cat:"tiere",links:[{href:"Futter_Bestellplaner.html",label:"Bestellplaner"}]},
      {name:"Tee & bewusste Pause",note:"nicht nebenbei — wirklich genießen",cat:"seele",links:[{href:"tee-des-tages.html",label:"Tee"}]},
      {name:"Frische Luft & Bewegung",note:"Spaziergang, Wald, oder kurz raus",cat:"körper"},
      {name:"Eine Sache erledigen",note:"die sich schon länger wartet",cat:"arbeit"},
    ]
  },
  mittag:{
    mood:"Die Mitte des Tages — du bist unterwegs, lehrst, lernst, schaffst. Alles fließt durch dich hindurch. Ich will diesen Mittag so leben, wie ich mein ganzes Leben leben will.",
    tasks:[
      {name:"VHS oder Atelier",note:"ganz präsent sein",cat:"arbeit",links:[{href:"VHS_Kursvorbereitung.html",label:"VHS"}]},
      {name:"Mittagessen bewusst",note:"LP(a)-freundlich",cat:"ernährung",links:[{href:"Ernaehrungsplan_4Wochen.html",label:"Ernährungsplan"},{href:"Einkaufsliste.html",label:"Einkauf"}]},
      {name:"Gabapentin (Rudi)",note:"nach dem Mittagessen",cat:"tiere",links:[{href:"Katzen_Medikamente.html",label:"Katzen-Med."}]},
      {name:"Bewegung oder frische Luft",note:"auch 10 Min. zählen",cat:"körper"},
      {name:"DaZF-Aufgabe",note:"ein kleiner Schritt genügt",cat:"lernen",links:[{href:"Lernplan.html",label:"Lernplan"}]},
      {name:"Anulind",note:"Creme auftragen",cat:"pflege"},
    ]
  },
  nachmittag:{
    mood:"Der Nachmittag — eine zweite Chance, ganz bei dir zu sein. Ich will diesen Nachmittag so leben, wie ich mein ganzes Leben leben will.",
    tasks:[
      {name:"Sport",note:"aufwärmen, trainieren, dehnen",cat:"sport",links:[{href:"Aufwaermen.html",label:"Aufwärmen"},{href:"Koerpergewicht_Training_Audio.html",label:"Kraft"},{href:"Balanceboard_Training_Audio.html",label:"Balance"},{href:"Sonntags_Yoga_Audio.html",label:"Yoga"},{href:"Dehnplan.html",label:"Dehnen"},{href:"Kalkschulter.html",label:"Schulter"},{href:"Beckenboden.html",label:"Beckenboden"}]},
      {name:"Duschen & Körperpflege",note:"Weleda, Wärme, für mich",cat:"pflege",links:[{href:"Duschen.html",label:"Duschen"},{href:"Koerperpflege_Tagesplan.html",label:"Körperpflege"},{href:"Haarpflege.html",label:"Haarpflege"},{href:"Nagelpflege.html",label:"Nagelpflege"}]},
      {name:"DaZF oder Vorbereitung",note:"ruhig & fokussiert",cat:"lernen",links:[{href:"Lernplan.html",label:"Lernplan"},{href:"VHS_Kursvorbereitung.html",label:"VHS abschließen"}]},

    ]

var currentPhase=null;

function getPhaseByTime(){
  var h=today.getHours();
  if(h<9)return'morgen';
  if(h<12)return'vormittag';
  if(h<15)return'mittag';
  if(h<18)return'nachmittag';
  return'abend';
}

function showPhase(p){
  currentPhase=p;
  ['morgen','vormittag','mittag','nachmittag','abend'].forEach(function(w){
    document.getElementById('wave-'+w).className='wave'+(w===p?' active':'');
  });
  var phase=PHASES[p];
  var html='<div class="phase-card"><div class="phase-mood">'+phase.mood+'</div>';
  phase.tasks.forEach(function(t,i){
    var key=p+'_'+i;
    var done=!!taskState[key];
    var linksHtml='';
    if(t.links&&t.links.length){
      linksHtml='<div class="task-links">';
      t.links.forEach(function(l){
        if(l.href==='#notizen'){
          linksHtml+='<a class="task-link" href="#" onclick="scrollToNotizen(event)">'+l.label+' ›</a>';
        } else {
          linksHtml+='<a class="task-link" href="'+l.href+'">'+l.label+' ›</a>';
        }
      });
      linksHtml+='</div>';
    }
    html+='<div class="task-item'+(done?' done':'')+'" onclick="toggleTask(\''+p+'\','+i+')">'
      +'<div class="task-check"></div>'
      +'<div style="flex:1;min-width:0;">'
      +'<div class="task-name">'+t.name+'</div>'
      +'<div class="task-note">'+t.note+'</div>'
      +linksHtml
      +'</div>'
      +'<div class="task-cat">'+t.cat+'</div>'
      +'</div>';
  });
  html+='</div>';
  document.getElementById('phaseContent').innerHTML=html;
}

function scrollToNotizen(e){
  e.preventDefault();e.stopPropagation();
  var el=document.getElementById('notizText');
  if(el){el.scrollIntoView({behavior:'smooth',block:'center'});setTimeout(function(){el.focus();},400);}
}

function toggleTask(p,i){
  var key=p+'_'+i;
  taskState[key]=!taskState[key];
  saveTaskState();
  if(taskState[key]) showLebenMoment();
  showPhase(p);
}

        messages:[{role:'user',content:`${DAYS_DE[today.getDay()]}, ${jahreszeit}, ${tageszeit}. Tee heute: ${tea[0]} (${tea[1]}).`}]
      })

var showingAllApps=false;

function renderApps(phase){
  var list=document.getElementById('apps-list');
  var btn=document.getElementById('alle-apps-btn');
  var label=document.getElementById('apps-label');
  if(!list)return;

  var phaseApps=ALL_APPS.filter(function(a){return a.phasen.indexOf(phase)>=0;});
  var appsToShow=showingAllApps?ALL_APPS:phaseApps;

  label.textContent=showingAllApps?'Alle Apps':'Jetzt passend';
  btn.textContent=showingAllApps?'↑ weniger anzeigen':'alle Apps anzeigen ↓';

  list.innerHTML=appsToShow.map(function(a){
    return '<a class="al" href="'+a.href+'"><span class="al-icon">'+a.icon+'</span>'
      +'<div><div class="al-text">'+a.text+'</div><div class="al-sub">'+a.sub+'</div></div>'
      +'<span class="al-arr">›</span></a>';
  }).join('');
}

function toggleAllApps(){
  showingAllApps=!showingAllApps;
  renderApps(currentPhase||getPhaseByTime());
}

// Apps auch beim Phasenwechsel neu rendern
var _origShowPhase=showPhase;
showPhase=function(p){
  _origShowPhase(p);
  renderApps(p);
};

// ── INIT ──
loadIntention(false);
showPhase(getPhaseByTime());
initReflex();
loadNotiz();
