<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Villa Kunterbunt</title>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Fredoka+One&family=Nunito:wght@400;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --gelb: #FFD93D;
  --rot: #E84855;
  --blau: #3D87CB;
  --grün: #4CAF72;
  --orange: #FF6B35;
  --lila: #9B5DE5;
  --creme: #FFF8E7;
  --dunkel: #1a0a00;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--creme);
  font-family: 'Nunito', sans-serif;
  color: var(--dunkel);
  min-height: 100vh;
  overflow-x: hidden;
  position: relative;
}

/* Schräge bunte Streifen im Hintergrund */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    repeating-linear-gradient(
      -12deg,
      transparent 0px,
      transparent 60px,
      rgba(255,217,61,0.07) 60px,
      rgba(255,217,61,0.07) 80px,
      transparent 80px,
      transparent 140px,
      rgba(232,72,85,0.05) 140px,
      rgba(232,72,85,0.05) 160px,
      transparent 160px,
      transparent 220px,
      rgba(61,135,203,0.05) 220px,
      rgba(61,135,203,0.05) 240px
    );
  pointer-events: none;
  z-index: 0;
}

/* Holzzaun unten */
body::after {
  content: '';
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 8px;
  background: repeating-linear-gradient(
    90deg,
    var(--orange) 0px, var(--orange) 28px,
    var(--gelb) 28px, var(--gelb) 56px,
    var(--rot) 56px, var(--rot) 84px,
    var(--blau) 84px, var(--blau) 112px,
    var(--grün) 112px, var(--grün) 140px
  );
  z-index: 100;
}

.container {
  max-width: 420px;
  margin: 0 auto;
  padding: 0 0 80px;
  position: relative;
  z-index: 1;
}

/* ═══ DACH ═══ */
.dach {
  position: relative;
  width: 100%;
  overflow: hidden;
  line-height: 0;
}

.dach svg {
  width: 100%;
  display: block;
}

/* ═══ HAUS-FASSADE ═══ */
.fassade {
  background: #FFF8E7;
  position: relative;
  padding: 0 1.2rem 1.5rem;
}

/* Fenster-Effekt links und rechts */
.fassade::before, .fassade::after {
  content: '';
  position: absolute;
  top: 1rem;
  width: 60px;
  height: 60px;
  background: var(--gelb);
  border: 3px solid var(--dunkel);
  border-radius: 8px 8px 50% 50%;
}
.fassade::before { left: -20px; transform: rotate(-8deg); }
.fassade::after { right: -20px; transform: rotate(8deg); }

/* ═══ SCHILD ═══ */
.schild {
  background: var(--gelb);
  border: 4px solid var(--dunkel);
  border-radius: 16px;
  padding: 1rem 1.5rem;
  margin: 0 0 1rem;
  text-align: center;
  position: relative;
  box-shadow: 5px 5px 0 var(--dunkel);
  transform: rotate(-1deg);
}

.schild::before {
  content: '🌟';
  position: absolute;
  top: -16px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 1.8rem;
}

.schild-titel {
  font-family: 'Limelight', cursive;
  font-size: 2rem;
  color: var(--dunkel);
  line-height: 1.1;
  letter-spacing: .02em;
}

.schild-sub {
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: var(--dunkel);
  opacity: .7;
  margin-top: .2rem;
}

/* ═══ DATUM BANNER ═══ */
.datum-banner {
  background: var(--rot);
  color: white;
  font-family: 'Fredoka One', cursive;
  font-size: .95rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  padding: .4rem 1.2rem;
  margin: 0 -1.2rem .8rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* ═══ TAGES-IMPULS ═══ */
.impuls-karte {
  background: white;
  border: 3px solid var(--dunkel);
  border-radius: 20px;
  padding: 1rem 1.2rem;
  margin-bottom: 1rem;
  position: relative;
  box-shadow: 4px 4px 0 var(--dunkel);
  overflow: hidden;
}

.impuls-karte::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: repeating-linear-gradient(90deg,
    var(--rot) 0,var(--rot) 20%,
    var(--gelb) 20%,var(--gelb) 40%,
    var(--grün) 40%,var(--grün) 60%,
    var(--blau) 60%,var(--blau) 80%,
    var(--lila) 80%,var(--lila) 100%
  );
}

.impuls-label {
  font-size: .7rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--rot);
  font-weight: 700;
  margin-bottom: .3rem;
  margin-top: .3rem;
}

.impuls-text {
  font-family: 'Caveat', cursive;
  font-size: 1.5rem;
  color: var(--dunkel);
  line-height: 1.4;
}

/* ═══ WELLEN-TABS ═══ */
.phasen-tabs {
  display: flex;
  gap: .5rem;
  margin-bottom: 1rem;
}

.phase-tab {
  flex: 1;
  background: white;
  border: 3px solid var(--dunkel);
  border-radius: 16px 16px 8px 8px;
  padding: .5rem .3rem;
  text-align: center;
  cursor: pointer;
  transition: transform .15s, box-shadow .15s;
  box-shadow: 3px 3px 0 var(--dunkel);
  position: relative;
  overflow: hidden;
}

.phase-tab:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--dunkel); }

.phase-tab.aktiv {
  transform: translateY(-3px);
  box-shadow: 3px 6px 0 var(--dunkel);
}

.phase-tab.aktiv-morgen { background: var(--gelb); }
.phase-tab.aktiv-unterwegs { background: var(--orange); }
.phase-tab.aktiv-abend { background: var(--lila); color: white; }

.tab-icon { font-size: 1.3rem; display: block; }
.tab-name { font-family: 'Fredoka One', cursive; font-size: .75rem; display: block; margin-top: .1rem; }
.tab-zeit { font-size: .6rem; opacity: .65; font-weight: 600; }

/* ═══ PHASE KARTE ═══ */
.phase-karte {
  background: white;
  border: 3px solid var(--dunkel);
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 5px 5px 0 var(--dunkel);
  margin-bottom: 1rem;
  animation: reingehüpft .3s cubic-bezier(.34,1.56,.64,1);
}

@keyframes reingehüpft {
  from { transform: scale(.96) translateY(8px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

.phase-kopf {
  padding: .8rem 1.1rem .6rem;
  position: relative;
}

.phase-kopf-morgen { background: var(--gelb); }
.phase-kopf-unterwegs { background: var(--orange); color: white; }
.phase-kopf-abend { background: var(--lila); color: white; }

.phase-motto {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  line-height: 1.3;
  font-weight: 600;
}

/* ═══ AUFGABEN ═══ */
.aufgabe {
  display: flex;
  align-items: flex-start;
  gap: .7rem;
  padding: .65rem 1rem;
  border-bottom: 2px dashed rgba(26,10,0,0.1);
  cursor: pointer;
  transition: background .15s;
  -webkit-tap-highlight-color: transparent;
}

.aufgabe:last-child { border-bottom: none; }
.aufgabe:active { background: rgba(255,217,61,0.2); }
.aufgabe.erledigt { opacity: .35; }
.aufgabe.erledigt .aufg-name { text-decoration: line-through; }

.aufg-kreis {
  width: 22px;
  height: 22px;
  border: 3px solid var(--dunkel);
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: .8rem;
  transition: all .2s;
  background: white;
}

.aufgabe.erledigt .aufg-kreis {
  background: var(--grün);
  border-color: var(--grün);
  color: white;
}

.aufg-inhalt { flex: 1; }
.aufg-name { font-size: 1rem; font-weight: 600; line-height: 1.3; }
.aufg-note { font-family: 'Caveat', cursive; font-size: .95rem; color: rgba(26,10,0,.5); margin-top: .05rem; }

/* ═══ UNTERWEGS KARTE ═══ */
.unterwegs-karte {
  background: var(--orange);
  border: 3px solid var(--dunkel);
  border-radius: 20px;
  padding: 1.5rem 1.2rem;
  text-align: center;
  box-shadow: 5px 5px 0 var(--dunkel);
  color: white;
  margin-bottom: 1rem;
}

.unterwegs-emoji {
  font-size: 3rem;
  display: block;
  animation: schaukeln 2s ease-in-out infinite;
}

@keyframes schaukeln {
  0%,100% { transform: rotate(-5deg); }
  50% { transform: rotate(5deg); }
}

.unterwegs-satz {
  font-family: 'Caveat', cursive;
  font-size: 1.6rem;
  font-weight: 700;
  line-height: 1.3;
  margin-top: .5rem;
}

/* ═══ REFLEXION ═══ */
.reflex-karte {
  background: white;
  border: 3px solid var(--dunkel);
  border-radius: 20px;
  padding: 1rem 1.1rem;
  box-shadow: 4px 4px 0 var(--dunkel);
  margin-bottom: 1rem;
}

.reflex-frage {
  font-family: 'Caveat', cursive;
  font-size: 1.2rem;
  color: var(--rot);
  margin-bottom: .6rem;
  font-weight: 600;
}

.reflex-feld {
  width: 100%;
  border: 2px solid rgba(26,10,0,.2);
  border-radius: 12px;
  padding: .6rem .8rem;
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  color: var(--dunkel);
  background: var(--creme);
  resize: none;
  min-height: 80px;
  outline: none;
}

.reflex-feld:focus { border-color: var(--rot); }

.reflex-btn {
  background: var(--rot);
  color: white;
  border: 2px solid var(--dunkel);
  border-radius: 20px;
  padding: .4rem 1.2rem;
  font-family: 'Fredoka One', cursive;
  font-size: .95rem;
  cursor: pointer;
  margin-top: .5rem;
  box-shadow: 2px 2px 0 var(--dunkel);
  transition: transform .1s, box-shadow .1s;
}

.reflex-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--dunkel); }

/* ═══ GUTER TAG BUTTON ═══ */
.guter-tag-btn {
  width: 100%;
  background: var(--grün);
  color: white;
  border: 3px solid var(--dunkel);
  border-radius: 20px;
  padding: .85rem 1rem;
  font-family: 'Fredoka One', cursive;
  font-size: 1.1rem;
  cursor: pointer;
  box-shadow: 4px 4px 0 var(--dunkel);
  margin-bottom: 1rem;
  transition: transform .15s, box-shadow .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: .5rem;
}

.guter-tag-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--dunkel); }

/* ═══ CONFETTI ═══ */
.konfetti {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
  display: none;
}

.konfetti-stück {
  position: absolute;
  width: 10px;
  height: 10px;
  animation: fallen 1.5s ease-in forwards;
}

@keyframes fallen {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

/* ═══ TOAST ═══ */
.toast {
  position: fixed;
  bottom: 5rem;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--dunkel);
  color: var(--gelb);
  font-family: 'Caveat', cursive;
  font-size: 1.1rem;
  padding: .5rem 1.2rem;
  border-radius: 20px;
  opacity: 0;
  transition: all .3s;
  z-index: 200;
  white-space: nowrap;
  pointer-events: none;
}

.toast.sichtbar {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ═══ ABSCHNITT-TRENNER ═══ */
.trenner {
  text-align: center;
  font-size: 1.2rem;
  margin: .5rem 0 .8rem;
  opacity: .4;
  letter-spacing: .3rem;
}

/* ═══ FLOATING DEKO ═══ */
.deko-links {
  position: fixed;
  left: -5px;
  top: 40%;
  font-size: 1.5rem;
  opacity: .15;
  transform: rotate(-15deg);
  pointer-events: none;
  z-index: 0;
}

.deko-rechts {
  position: fixed;
  right: -5px;
  top: 55%;
  font-size: 1.5rem;
  opacity: .15;
  transform: rotate(15deg);
  pointer-events: none;
  z-index: 0;
}

</style>
</head>
<body>

<div class="deko-links">🐴<br>🐴<br>🐴</div>
<div class="deko-rechts">⭐<br>⭐<br>⭐</div>

<div class="konfetti" id="konfetti"></div>
<div class="toast" id="toast"></div>

<div class="container">

  <!-- DACH -->
  <div class="dach">
    <svg viewBox="0 0 420 120" xmlns="http://www.w3.org/2000/svg">
      <!-- Himmel -->
      <rect width="420" height="120" fill="#87CEEB"/>
      <!-- Wolken -->
      <ellipse cx="60" cy="30" rx="35" ry="18" fill="white" opacity=".9"/>
      <ellipse cx="85" cy="22" rx="28" ry="16" fill="white" opacity=".9"/>
      <ellipse cx="340" cy="40" rx="30" ry="15" fill="white" opacity=".8"/>
      <ellipse cx="365" cy="32" rx="25" ry="14" fill="white" opacity=".8"/>
      <!-- Sonne -->
      <circle cx="380" cy="20" r="18" fill="var(--gelb)" opacity=".9"/>
      <line x1="380" y1="0" x2="380" y2="5" stroke="var(--gelb)" stroke-width="2"/>
      <line x1="395" y1="5" x2="392" y2="9" stroke="var(--gelb)" stroke-width="2"/>
      <line x1="365" y1="5" x2="368" y2="9" stroke="var(--gelb)" stroke-width="2"/>
      <!-- Dach links (rot-weiß gestreift) -->
      <polygon points="0,120 180,25 180,120" fill="var(--rot)"/>
      <polygon points="0,120 180,25 180,120" fill="url(#streifenL)"/>
      <!-- Dach rechts (blau-weiß gestreift) -->
      <polygon points="420,120 240,25 240,120" fill="var(--blau)"/>
      <polygon points="420,120 240,25 240,120" fill="url(#streifenR)"/>
      <!-- Mitteldach (grün) -->
      <polygon points="150,120 210,20 270,120" fill="var(--grün)"/>
      <!-- Schornstein -->
      <rect x="290" y="30" width="22" height="55" fill="var(--orange)"/>
      <rect x="286" y="26" width="30" height="10" fill="var(--dunkel)" rx="3"/>
      <!-- Rauch -->
      <circle cx="301" cy="15" r="7" fill="white" opacity=".5"/>
      <circle cx="308" cy="8" r="5" fill="white" opacity=".35"/>
      <!-- Stern auf dem Mitteldach -->
      <text x="210" y="70" text-anchor="middle" font-size="20" fill="var(--gelb)">⭐</text>
      <!-- Bodenlinie -->
      <rect x="0" y="118" width="420" height="4" fill="var(--dunkel)" opacity=".3"/>
      <defs>
        <pattern id="streifenL" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
          <rect width="8" height="16" fill="white" opacity=".15"/>
        </pattern>
        <pattern id="streifenR" patternUnits="userSpaceOnUse" width="16" height="16" patternTransform="rotate(45)">
          <rect width="8" height="16" fill="white" opacity=".15"/>
        </pattern>
      </defs>
    </svg>
  </div>

  <!-- FASSADE -->
  <div class="fassade">

    <!-- SCHILD -->
    <div class="schild">
      <div class="schild-titel">Villa Kunterbunt</div>
      <div class="schild-sub">Dieses Leben wähle ich ✦</div>
    </div>

    <!-- DATUM -->
    <div class="datum-banner">
      <span id="datumText">Heute</span>
      <span>🎪</span>
    </div>

    <!-- GUTER TAG BUTTON -->
    <button class="guter-tag-btn" onclick="zeigGutenTag()">
      <span>🌟</span> Das ist ein guter Tag für mich
    </button>

    <!-- IMPULS -->
    <div class="impuls-karte">
      <div class="impuls-label">✦ Mein heutiger Impuls</div>
      <div class="impuls-text" id="impulsText">
        Heute darf alles leicht sein — wie Pippi, die einfach losspringt.
      </div>
    </div>

    <!-- PHASEN TABS -->
    <div class="phasen-tabs" id="phasenTabs">
      <div class="phase-tab aktiv aktiv-morgen" onclick="zeigePhase('morgen')" id="tab-morgen">
        <span class="tab-icon">✨</span>
        <span class="tab-name">Bevor ich</span>
        <span class="tab-zeit">bis 13:15</span>
      </div>
      <div class="phase-tab" onclick="zeigePhase('unterwegs')" id="tab-unterwegs">
        <span class="tab-icon">🎪</span>
        <span class="tab-name">Unterwegs</span>
        <span class="tab-zeit">13:15–18:00</span>
      </div>
      <div class="phase-tab" onclick="zeigePhase('abend')" id="tab-abend">
        <span class="tab-icon">🌙</span>
        <span class="tab-name">Ankommen</span>
        <span class="tab-zeit">ab 18:00</span>
      </div>
    </div>

    <!-- PHASE INHALT -->
    <div id="phaseInhalt"></div>

    <!-- REFLEXION -->
    <div class="trenner">✦ · ✦ · ✦</div>
    <div class="reflex-karte">
      <div class="reflex-frage" id="reflexFrage">🌸 Was war heute schön?</div>
      <textarea class="reflex-feld" id="reflexText" placeholder="Einfach drauflosschreiben …" rows="3"></textarea>
      <button class="reflex-btn" onclick="speichereReflex()">✦ festhalten</button>
    </div>

  </div>
</div>

<script>
var TAGE = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
var MONATE = ['Jänner','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var heute = new Date();

// Datum
document.getElementById('datumText').textContent =
  TAGE[heute.getDay()] + ', ' + heute.getDate() + '. ' + MONATE[heute.getMonth()];

// Phasen

  morgen: {

    ]
  },

  abend: {
    motto: "Du bist zuhause. Jetzt gehört der Rest dir. 🌙",

    aufgaben: [
      {name:"Katzen füttern", note:"Rudi & Timmy — ca. 18:00 🐱"},
      {name:"Abendessen", note:"schön kochen, bewusst genießen"},

      {name:"Schlafen", note:"früh genug, du weißt warum 🌙"},
    ]
  }
};

var PIPPI_SAETZE = [
  "Das tue ich mit Freude!",
  "Nächstes Abenteuer! 🎪",
  "Jeder Schritt — meiner.",
  "Das ist mein geliebtes Leben.",
  "Schön, dass ich das tue.",
  "Genau das. Genau jetzt.",
  "Ich lebe, wie ich leben will!",
  "Das zählt. ✦"
];

var REFLEX_FRAGEN = [
  "🌸 Was war heute schön?",
  "✦ Was hat mich heute lebendig gemacht?",
  "🎪 Was würde ich heute nochmal tun?",
  "🌿 Wofür bin ich heute dankbar?",
  "⭐ Was hat heute gut funktioniert?",
  "🌈 Was hat mich heute überrascht?",
];

var taskState = {};
try { taskState = JSON.parse(localStorage.getItem('vk_tasks_' + heute.toISOString().slice(0,10)) || '{}'); } catch(e) {}

function speichereTaskState() {
  try { localStorage.setItem('vk_tasks_' + heute.toISOString().slice(0,10), JSON.stringify(taskState)); } catch(e) {}
}

var aktivePhase = 'morgen';

// Auto-Phase
function getPhaseNachZeit() {
  var h = heute.getHours(), m = heute.getMinutes();
  var t = h * 60 + m;
  if (t < 13*60+15) return 'morgen';
  if (t < 18*60) return 'unterwegs';
  return 'abend';
}

aktivePhase = getPhaseNachZeit();

function zeigePhase(p) {
  aktivePhase = p;
  // Tabs updaten
  ['morgen','unterwegs','abend'].forEach(function(t) {
    var el = document.getElementById('tab-'+t);
    el.className = 'phase-tab' + (t === p ? ' aktiv aktiv-'+t : '');
  });
  renderPhase(p);
}

function renderPhase(p) {
  var inhalt = document.getElementById('phaseInhalt');

  if (p === 'unterwegs') {
    inhalt.innerHTML = '<div class="unterwegs-karte">' +
      '<span class="unterwegs-emoji">🎪</span>' +
      '<div class="unterwegs-satz">Ich unterrichte.<br>Ich bewege mich.<br>Ich bin lebendig.</div>' +
      '</div>';
    return;
  }

  var phase = PHASEN[p];
  var html = '<div class="phase-karte">' +
    '<div class="phase-kopf phase-kopf-'+p+'">' +
    '<div class="phase-motto">'+phase.motto+'</div>' +
    '</div>';

  phase.aufgaben.forEach(function(a, i) {
    var key = p + '_' + i;
    var erledigt = !!taskState[key];
    html += '<div class="aufgabe'+(erledigt?' erledigt':'')+'" onclick="toggleAufgabe(\''+p+'\','+i+')">' +
      '<div class="aufg-kreis">'+(erledigt?'✓':'')+'</div>' +
      '<div class="aufg-inhalt">' +
      '<div class="aufg-name">'+a.name+'</div>' +
      '<div class="aufg-note">'+a.note+'</div>' +
      '</div></div>';
  });

  html += '</div>';
  inhalt.innerHTML = html;
}

function toggleAufgabe(p, i) {
  var key = p + '_' + i;
  taskState[key] = !taskState[key];
  speichereTaskState();
  if (taskState[key]) zeigeToast();
  renderPhase(p);
}

var toastTimer = null;
var toastIdx = 0;
function zeigeToast() {
  var toast = document.getElementById('toast');
  toast.textContent = PIPPI_SAETZE[toastIdx % PIPPI_SAETZE.length];
  toastIdx++;
  toast.classList.add('sichtbar');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { toast.classList.remove('sichtbar'); }, 2000);
}

function zeigGutenTag() {
  var farben = ['var(--rot)','var(--gelb)','var(--blau)','var(--grün)','var(--lila)','var(--orange)'];
  var k = document.getElementById('konfetti');
  k.style.display = 'block';
  k.innerHTML = '';
  for (var i = 0; i < 40; i++) {
    var s = document.createElement('div');
    s.className = 'konfetti-stück';
    s.style.cssText = 'left:'+Math.random()*100+'%;top:-10px;' +
      'background:'+farben[Math.floor(Math.random()*farben.length)]+';' +
      'border-radius:'+(Math.random()>0.5?'50%':'2px')+';' +
      'animation-delay:'+(Math.random()*0.8)+'s;' +
      'animation-duration:'+(1+Math.random())+'s;' +
      'width:'+(8+Math.random()*8)+'px;height:'+(8+Math.random()*8)+'px;';
    k.appendChild(s);
  }
  setTimeout(function() { k.style.display = 'none'; }, 2500);
}

// Reflexion
var reflexFragen = [...REFLEX_FRAGEN];
var aktFrage = Math.floor(Math.random() * reflexFragen.length);
document.getElementById('reflexFrage').textContent = reflexFragen[aktFrage];

function speichereReflex() {
  var text = document.getElementById('reflexText').value.trim();
  if (!text) return;
  var toast = document.getElementById('toast');
  toast.textContent = '✦ festgehalten!';
  toast.classList.add('sichtbar');
  setTimeout(function() { toast.classList.remove('sichtbar'); }, 2000);
  document.getElementById('reflexText').value = '';
  aktFrage = (aktFrage + 1) % reflexFragen.length;
  document.getElementById('reflexFrage').textContent = reflexFragen[aktFrage];
}

// Init
zeigePhase(aktivePhase);
</script>
</body>
</html>
