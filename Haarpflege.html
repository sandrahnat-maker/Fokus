<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Haarpflege</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf3e8;--card:#fffdf8;--text:#2e2010;--muted:rgba(46,32,16,0.5);--gold:#c8943a;--gold-light:#e8c97a;--sage:#7a9a5a;--border:rgba(180,130,70,0.18);--shadow:rgba(160,100,30,0.10);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:"Cormorant Garamond",serif;color:var(--text);min-height:100vh;padding-bottom:4rem;background-image:radial-gradient(ellipse at 10% 0%,rgba(200,148,58,0.08) 0%,transparent 60%),radial-gradient(ellipse at 90% 100%,rgba(122,154,90,0.07) 0%,transparent 60%);}
.back{display:inline-flex;align-items:center;gap:.3rem;font-size:13px;color:var(--gold);text-decoration:none;padding:1rem 1.2rem .2rem;opacity:.8;}
header{padding:.2rem 1.2rem .9rem;border-bottom:1px solid var(--border);}
.lbl{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:.2rem;}
.ttl{font-family:"Playfair Display",serif;font-size:1.5rem;font-style:italic;font-weight:400;line-height:1.2;}
.sub{font-size:13px;color:var(--muted);font-style:italic;margin-top:.2rem;}
.progress-wrap{padding:.6rem 1.2rem .2rem;}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:.3rem;}
.progress-bar{height:3px;background:var(--border);border-radius:10px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:10px;transition:width .5s ease;}
.sec{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);padding:.9rem 1.2rem .2rem;}
.info-box{margin:.3rem 1rem .5rem;padding:.6rem .9rem;background:rgba(200,148,58,0.07);border-left:2.5px solid var(--gold);border-radius:0 10px 10px 0;font-size:13px;font-style:italic;color:var(--muted);line-height:1.6;}
.card{background:var(--card);border-radius:16px;border:1.5px solid var(--border);box-shadow:0 3px 16px var(--shadow);margin:.2rem 1rem .5rem;overflow:hidden;}
.item{display:flex;align-items:flex-start;gap:.65rem;padding:.7rem .9rem;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.item:last-child{border-bottom:none;}
.item:active{background:rgba(200,148,58,0.06);}
.item.done{opacity:.42;}
.item.done .nm{text-decoration:line-through;text-decoration-color:var(--gold-light);}
.check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.item.done .check{background:var(--sage);border-color:var(--sage);}
.item.done .check::after{content:"✓";color:#fff;font-size:11px;}
.nm{font-size:15px;color:var(--text);line-height:1.3;}
.sb{font-size:12px;font-style:italic;color:var(--muted);margin-top:2px;line-height:1.4;}
.reset{position:fixed;bottom:1.2rem;right:1.2rem;background:transparent;border:1.5px solid var(--border);color:var(--muted);border-radius:30px;padding:.4rem 1rem;font-size:13px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
</style>
</head>
<body>
<a class="back" href="index.html">← Mein Fokus</a>
<header>
  <div class="lbl">Pflege & Schönheit</div>
  <div class="ttl">Haarpflege</div>
  <div class="sub">Mit Weleda Hirse & Naturölen</div>
</header>
<div class="progress-wrap">
  <div class="progress-label"><span id="pTxt">0 erledigt</span><span id="pPct">0%</span></div>
  <div class="progress-bar"><div class="progress-fill" id="pFill" style="width:0%"></div></div>
</div>
<div id="L"></div>
<button class="reset" onclick="rst()">↺ Neu beginnen</button>
<script>
var D=[
  {info:"Mo: Feuchtigkeitsmaske · Mi: Maske + Apfelessig · Fr: Öl-Behandlung · So: Protein-DIY"},
  {sec:"Täglich"},
  {n:"Haare kämmen & bürsten",s:"Sanft von unten nach oben — nie reißen"},
  {n:"Kopfhaut prüfen",s:"Schuppig? Trocken? → Öl-Behandlung einplanen"},
  {sec:"Montag — Feuchtigkeitsmaske"},
  {n:"Weleda Hirse Haarmaske",s:"15 Min einwirken — auf feuchtes Haar"},
  {n:"Gründlich ausspülen"},
  {n:"Arganöl ins feuchte Haar",s:"3–4 Tropfen — Längen & Spitzen"},
  {sec:"Mittwoch — Maske + Apfelessig"},
  {n:"Weleda Hirse Haarmaske",s:"15 Min einwirken"},
  {n:"Apfelessig-Spülung",s:"1 EL : 500 ml Wasser — kurz einwirken, ausspülen"},
  {n:"Arganöl ins feuchte Haar",s:"3–4 Tropfen"},
  {sec:"Freitag — Öl-Behandlung (Intensiv)"},
  {n:"Arganöl großzügig auftragen",s:"Längen & Spitzen — 30 Min oder über Nacht"},
  {n:"Shampoo ohne Vorspülen",s:"Weleda Hirse Shampoo direkt ins Öl"},
  {sec:"Sonntag — Protein-Maske (1× monatlich)"},
  {n:"1 Ei + 1 EL Honig + 1 EL Olivenöl",s:"Auf feuchtes Haar — 30 Min einwirken"},
  {n:"Mit kühlem Wasser ausspülen",s:"Nicht heiß — sonst stockt das Ei"},
  {sec:"Friseur & Termine"},
  {n:"Friseur 4× jährlich",s:"Mär / Jun / Sep / Dez — Fransen + Spitzen"},
  {n:"Fransen selbst schneiden",s:"Alle 4 Wochen — trocken, scharfe Schere, vertikal"},
  {n:"Olaplex Haarkur",s:"1× jährlich bei Christina — 0690/104 949 26"},
  {sec:"Kopfhautmassage"},
  {n:"Süßmandelöl einmassieren",s:"1× monatlich — 5 Min kreisende Bewegungen"}
];
var S={};
var items=D.filter(function(d){return !d.sec&&!d.info;});
function count(){return Object.keys(S).filter(function(k){return S[k];}).length;}
function prog(){
  var n=count(),t=items.length,p=t?Math.round(n/t*100):0;
  document.getElementById('pTxt').textContent=n+' von '+t+' erledigt';
  document.getElementById('pPct').textContent=p+'%';
  document.getElementById('pFill').style.width=p+'%';
}
function tog(i){if(!D[i]||D[i].sec||D[i].info)return;S[i]=!S[i];rnd();}
function rst(){S={};rnd();}
function rnd(){
  var html='',inCard=false,idx=0;
  for(var i=0;i<D.length;i++){
    var it=D[i];
    if(it.info){if(inCard){html+='</div>';inCard=false;}html+='<div class="info-box">'+it.info+'</div>';continue;}
    if(it.sec){if(inCard){html+='</div>';inCard=false;}html+='<div class="sec">'+it.sec+'</div><div class="card">';inCard=true;continue;}
    var d=!!S[i];
    html+='<div class="item'+(d?' done':'')+'\" onclick="tog('+i+')">'
      +'<div class="check"></div>'
      +'<div><div class="nm">'+it.n+'</div>'+(it.s?'<div class="sb">'+it.s+'</div>':'')+'</div>'
      +'</div>';
  }
  if(inCard)html+='</div>';
  document.getElementById('L').innerHTML=html;
  prog();
}
rnd();
</script>
</body>
</html>
