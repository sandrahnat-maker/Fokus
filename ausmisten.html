<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandras Ausmist-Liste</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #fdf6ee;
    --bordeaux: #8b1a1a;
    --bordeaux-light: #b8294a;
    --gold: #c9a84c;
    --gold-light: #e8d5a0;
    --ink: #2a1a0e;
    --muted: #7a6050;
    --stripe-a: #f5ede0;
    --stripe-b: #fdf6ee;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    font-family: 'Raleway', sans-serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* WIMPELKETTE */
  .banner {
    background: var(--bordeaux);
    padding: 0.5rem 0 0.3rem;
    overflow: hidden;
    position: relative;
  }
  .pennants {
    display: flex;
    justify-content: center;
    gap: 0;
    padding: 0 1rem;
    flex-wrap: nowrap;
    overflow: hidden;
  }
  .pennant {
    width: 0;
    height: 0;
    border-left: 14px solid transparent;
    border-right: 14px solid transparent;
    border-top: 22px solid var(--gold);
    margin: 0 2px;
    flex-shrink: 0;
  }
  .pennant:nth-child(2n) { border-top-color: var(--cream); }
  .pennant:nth-child(3n) { border-top-color: var(--bordeaux-light); }
  .pennant:nth-child(4n) { border-top-color: var(--gold-light); }

  header {
    background: var(--bordeaux);
    padding: 1.5rem 1rem 2rem;
    text-align: center;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -18px; left: 0; right: 0;
    height: 36px;
    background: var(--bordeaux);
    clip-path: polygon(0 0, 100% 0, 100% 0, 50% 100%, 0 0);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    color: var(--cream);
    letter-spacing: 0.02em;
    line-height: 1.2;
  }
  .subtitle {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--gold-light);
    font-size: 1rem;
    margin-top: 0.3rem;
  }

  /* PROGRESS */
  .progress-wrap {
    max-width: 720px;
    margin: 3rem auto 0;
    padding: 0 1rem;
  }
  .progress-bar-bg {
    background: var(--gold-light);
    border-radius: 999px;
    height: 10px;
    overflow: hidden;
    border: 1px solid var(--gold);
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--bordeaux-light), var(--bordeaux));
    border-radius: 999px;
    transition: width 0.4s ease;
    width: 0%;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }
  .progress-label strong { color: var(--bordeaux); }

  /* CONTROLS */
  .controls {
    max-width: 720px;
    margin: 1.2rem auto 0;
    padding: 0 1rem;
    display: flex;
    gap: 0.6rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn {
    background: transparent;
    border: 1.5px solid var(--gold);
    color: var(--ink);
    font-family: 'Raleway', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--bordeaux);
    border-color: var(--bordeaux);
    color: var(--cream);
  }
  .reset-btn {
    margin-left: auto;
    background: transparent;
    border: 1.5px solid var(--bordeaux-light);
    color: var(--bordeaux-light);
    font-family: 'Raleway', sans-serif;
    font-size: 0.78rem;
    font-weight: 600;
    padding: 0.3rem 0.8rem;
    border-radius: 999px;
    cursor: pointer;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .reset-btn:hover { background: var(--bordeaux-light); color: var(--cream); }

  /* MAIN */
  main {
    max-width: 720px;
    margin: 1.5rem auto 4rem;
    padding: 0 1rem;
  }

  /* CATEGORY */
  .category {
    margin-bottom: 1.5rem;
    border: 1.5px solid var(--gold-light);
    border-radius: 4px;
    overflow: hidden;
  }
  .category-header {
    background: linear-gradient(135deg, var(--bordeaux) 0%, #6b1414 100%);
    padding: 0.75rem 1rem;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    cursor: pointer;
    user-select: none;
  }
  .category-icon { font-size: 1.2rem; flex-shrink: 0; }
  .category-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.05rem;
    color: var(--cream);
    flex: 1;
    letter-spacing: 0.02em;
  }
  .category-count {
    font-size: 0.78rem;
    color: var(--gold-light);
    font-weight: 600;
    white-space: nowrap;
  }
  .category-toggle {
    color: var(--gold);
    font-size: 1rem;
    transition: transform 0.25s;
    flex-shrink: 0;
  }
  .category.collapsed .category-toggle { transform: rotate(-90deg); }
  .category.collapsed .item-list { display: none; }

  /* ITEMS */
  .item-list { list-style: none; }
  .item {
    display: flex;
    align-items: flex-start;
    gap: 0.7rem;
    padding: 0.6rem 1rem;
    border-bottom: 1px solid var(--stripe-a);
    cursor: pointer;
    transition: background 0.15s;
  }
  .item:nth-child(even) { background: var(--stripe-a); }
  .item:nth-child(odd) { background: var(--stripe-b); }
  .item:hover { background: var(--gold-light); }
  .item:last-child { border-bottom: none; }

  .item.done { opacity: 0.45; }
  .item.done .item-text { text-decoration: line-through; color: var(--muted); }

  .checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--gold);
    border-radius: 3px;
    flex-shrink: 0;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    background: white;
  }
  .item.done .checkbox {
    background: var(--bordeaux);
    border-color: var(--bordeaux);
  }
  .item.done .checkbox::after {
    content: '✓';
    color: white;
    font-size: 11px;
    font-weight: bold;
  }

  .item-text {
    font-size: 0.88rem;
    line-height: 1.45;
    color: var(--ink);
  }
  .item-hint {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    font-style: italic;
    margin-top: 0.15rem;
  }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    color: var(--muted);
    font-size: 1rem;
  }

  /* FOOTER */
  .bottom-banner {
    background: var(--bordeaux);
    padding: 0.5rem 0;
  }
</style>
</head>

// State
let state = {};
let filter = 'all';

function loadState() {
  try {
    const s = localStorage.getItem('ausmisten_state');
    if (s) state = JSON.parse(s);
  } catch(e) {}
}

function saveState() {
  localStorage.setItem('ausmisten_state', JSON.stringify(state));
}

function isItemDone(id) { return !!state[id]; }

function toggleItem(id) {
  state[id] = !state[id];
  saveState();
  render();
}

function getTotals() {
  let total = 0, done = 0;
  DATA.forEach(cat => cat.items.forEach(item => {
    total++;
    if (isItemDone(item.id)) done++;
  }));
  return { total, done };
}

function render() {
  const main = document.getElementById('main');
  const { total, done } = getTotals();

  // Progress
  document.getElementById('progressFill').style.width = total ? (done/total*100)+'%' : '0%';
  document.getElementById('doneCount').textContent = done;
  document.getElementById('totalCount').textContent = total;

  // Categories
  let html = '';
  DATA.forEach(cat => {
    const catDone = cat.items.filter(i => isItemDone(i.id)).length;
    let visibleItems = cat.items;
    if (filter === 'done') visibleItems = cat.items.filter(i => isItemDone(i.id));
    if (filter === 'open') visibleItems = cat.items.filter(i => !isItemDone(i.id));
    if (visibleItems.length === 0) return;

    const collapsed = state['__collapsed_'+cat.id] ? 'collapsed' : '';
    html += `<div class="category ${collapsed}" data-cat="${cat.id}">
      <div class="category-header" onclick="toggleCollapse('${cat.id}')">
        <span class="category-icon">${cat.icon}</span>
        <span class="category-title">${cat.title}</span>
        <span class="category-count">${catDone}/${cat.items.length}</span>
        <span class="category-toggle">▾</span>
      </div>
      <ul class="item-list">`;

    visibleItems.forEach(item => {
      const done = isItemDone(item.id);
      html += `<li class="item${done?' done':''}" onclick="toggleItem('${item.id}')">
        <div class="checkbox"></div>
        <div class="item-text">${item.text}${item.hint ? `<span class="item-hint">${item.hint}</span>` : ''}</div>
      </li>`;
    });

    html += `</ul></div>`;
  });

  if (!html) html = `<div class="empty-state">Alle Aufgaben in dieser Ansicht erledigt ✦</div>`;
  main.innerHTML = html;
}

function toggleCollapse(catId) {
  state['__collapsed_'+catId] = !state['__collapsed_'+catId];
  saveState();
  render();
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    filter = this.dataset.filter;
    render();
  });
});

// Reset
document.getElementById('resetBtn').addEventListener('click', function() {
  if (confirm('Wirklich alles zurücksetzen? Alle Häkchen gehen verloren.')) {
    state = {};
    saveState();
    render();
  }
});

// Pennants
function makePennants(id) {
  const el = document.getElementById(id);
  let html = '';
  for (let i = 0; i < 40; i++) html += '<div class="pennant"></div>';
  el.innerHTML = html;
}
makePennants('pennants');
makePennants('pennants2');

loadState();
render();
</script>
