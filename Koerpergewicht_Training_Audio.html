<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Koerpergewicht Training</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#faf3e8;--white:#fffdf8;--text:#2e2010;--muted:rgba(20,10,0,0.55);--gold:#c8943a;--sage:#7a9a5a;--terra:#c4704a;--border:rgba(180,130,70,0.15);}
html{font-size:18px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);font-family:"Cormorant Garamond",Georgia,serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.2rem 1rem 2rem;}
.container{max-width:420px;width:100%;}
.header{text-align:center;margin-bottom:1.5rem;}
.header-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--sage);margin-bottom:.4rem;}
.header-title{font-family:"Playfair Display",serif;font-size:28px;font-style:italic;font-weight:400;color:var(--text);}
.header-title span{color:var(--sage);}
.header-sub{margin-top:.4rem;font-size:14px;color:var(--muted);font-style:italic;}
.timer-card{background:var(--white);border:1px solid var(--border);border-radius:20px;padding:1.8rem 1.2rem 1.2rem;margin-bottom:1rem;text-align:center;box-shadow:0 4px 20px rgba(180,120,40,0.08);}
.phase-label{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem;}
.phase-label.work{color:var(--sage);}
.phase-label.rest{color:var(--gold);}
.phase-label.done{color:var(--sage);}
.exercise-name{font-family:"Playfair Display",serif;font-size:28px;font-style:italic;font-weight:400;color:var(--text);margin-bottom:.4rem;min-height:2rem;}
.exercise-note{font-size:14px;color:var(--muted);font-style:italic;margin-bottom:1.2rem;min-height:1.2rem;}
.big-timer{font-family:"Playfair Display",serif;font-size:72px;font-weight:400;color:var(--text);line-height:1;margin-bottom:.5rem;}
.big-timer.work{color:var(--sage);}
.big-timer.rest{color:var(--gold);}
.big-timer.danger{color:var(--terra);}
.progress-bar-wrap{height:6px;background:var(--border);border-radius:6px;overflow:hidden;margin-bottom:.8rem;}
.progress-bar{height:100%;background:var(--sage);border-radius:6px;transition:width .5s linear;width:0%;}
.counters{display:flex;justify-content:center;gap:2rem;font-size:14px;color:var(--muted);}
.counter-val{font-family:"Playfair Display",serif;font-size:18px;color:var(--text);}
.btn-row{display:flex;gap:.7rem;margin-bottom:.8rem;}
.btn-start{flex:2;background:var(--sage);color:#fff;border:none;border-radius:14px;padding:.9rem;font-size:17px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
.btn-reset{flex:1;background:var(--white);border:1.5px solid var(--border);color:var(--muted);border-radius:14px;padding:.9rem;font-size:17px;font-family:"Cormorant Garamond",serif;cursor:pointer;}
.btn-unlock{width:100%;background:rgba(200,148,58,0.1);border:1.5px solid var(--border);color:var(--gold);border-radius:14px;padding:.6rem;font-size:15px;font-family:"Cormorant Garamond",serif;cursor:pointer;margin-bottom:.6rem;}
.vol-row{display:flex;align-items:center;gap:.7rem;background:var(--white);border:1px solid var(--border);border-radius:12px;padding:.6rem .9rem;margin-bottom:.8rem;}
.vol-label{font-size:13px;color:var(--muted);font-style:italic;flex-shrink:0;}
.vol-slider{flex:1;accent-color:var(--sage);}
.voice-status{font-size:12px;flex-shrink:0;}
.voice-status.ok{color:var(--sage);}
.voice-status.warn{color:var(--terra);}
.ex-list{background:var(--white);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.ex-row{display:flex;align-items:center;gap:.7rem;padding:.65rem 1rem;border-bottom:1px solid var(--border);}
.ex-row:last-child{border-bottom:none;}
.ex-row.active{background:rgba(122,154,90,0.08);}
.ex-row.done-ex{opacity:.4;}
.ex-dot{width:10px;height:10px;border-radius:50%;background:var(--border);flex-shrink:0;}
.ex-row.active .ex-dot{background:var(--sage);}
.ex-row.done-ex .ex-dot{background:var(--sage);opacity:.5;}
.ex-name-list{font-size:15px;color:var(--text);}
.ex-row.active .ex-name-list{font-weight:600;color:var(--sage);}
.dots-row{display:flex;flex-wrap:wrap;gap:.3rem;padding:.8rem 1rem;justify-content:center;}
.op-dot{width:10px;height:10px;border-radius:50%;background:var(--border);}
.op-dot.active{background:var(--sage);}
.op-dot.done-dot{background:var(--sage);opacity:.4;}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-label">Mo &amp; Fr &middot; 10:00</div>
    <div class="header-title"><em>Koerper</em><span>gewicht</span></div>
    <div class="header-sub">3 Runden &middot; 5 Uebungen &middot; 40 Sek Arbeit / 20 Sek Pause &middot; ~20 Min</div>
  </div>

  <div class="timer-card">
    <div class="phase-label" id="phaseLabel">BEREIT</div>
    <div class="exercise-name" id="exerciseName">Bereit machen</div>
    <div class="exercise-note" id="exerciseNote">Stell dich locker hin &middot; tief durchatmen</div>
    <div class="big-timer" id="bigTimer">&ndash;</div>
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
    <div class="counters">
      <div>Runde <span class="counter-val" id="roundDisplay">&ndash;</span> / 3</div>
      <div>Uebung <span class="counter-val" id="exerciseDisplay">&ndash;</span> / 5</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn-start" id="btnStart" onclick="handleStart()">&#9654; Starten</button>
    <button class="btn-reset" onclick="resetWorkout()">&#8635; Reset</button>
  </div>

  <button class="btn-unlock" onclick="unlockAudio()">&#128266; Audio freischalten (Android)</button>

  <div class="vol-row">
    <span class="vol-label">&#128266; Lautstaerke</span>
    <input class="vol-slider" type="range" id="volRange" min="0" max="1" step="0.1" value="0.9" onchange="updateVol()">
    <span class="voice-status" id="voiceStatus">...</span>
  </div>

  <div class="ex-list" id="exList"></div>
  <div class="dots-row" id="dotsRow"></div>
</div>

<script>
var EXERCISES = [
  {name:"Squats", note:"Fuesse schulterbreit, Knie ueber Zehen, tief runter", voice:"Squats! Fuesse schulterbreit, Knie ueber die Zehen, tief in die Knie."},
  {name:"Wandliegestuetze", note:"Haende auf Schulterhoehe, Koerper gerade halten", voice:"Wandliegestuetze! Haende auf Schulterhoehe, Koerper bleibt gerade."},
  {name:"Beckenheben", note:"Ruecken auf Boden, Gesaess langsam heben und senken", voice:"Beckenheben! Ruecken auf dem Boden, Fuesse aufgestellt, Gesaess heben."},
  {name:"Ausfallschritte", note:"Abwechselnd links und rechts, Knie 90 Grad", voice:"Ausfallschritte! Abwechselnd links und rechts, Knie neunzig Grad."},
  {name:"Plank", note:"Unterarme auf Boden, Koerper gerade wie ein Brett", voice:"Plank! Unterarme auf dem Boden, Koerper gerade wie ein Brett, atmen!"}
];

var ROUNDS = 3;
var WORK = 40;
var REST = 20;
var PREP = 5;
var ROUND_REST = 30;

var timer = null;
var secsLeft = 0;
var curRound = 0;
var curEx = 0;
var phase = "idle";
var paused = false;
var phaseDur = 0;
var elapsed = 0;
var vol = 0.9;
var synth = window.speechSynthesis || null;
var germVoice = null;

// Wake Lock
var wakeLock = null;
function reqWakeLock() {
  if (navigator.wakeLock) {
    navigator.wakeLock.request("screen").then(function(wl) { wakeLock = wl; }).catch(function() {});
  }
}
document.addEventListener("visibilitychange", function() {
  if (document.visibilityState === "visible") { reqWakeLock(); }
});
reqWakeLock();

// Voice
function loadVoices() {
  if (!synth) { document.getElementById("voiceStatus").textContent = "n/a"; return; }
  var voices = synth.getVoices();
  var prefs = ["Anna","Helena","Marlene","Google Deutsch","de-DE","de-AT","de-CH"];
  germVoice = null;
  for (var i = 0; i < prefs.length; i++) {
    for (var j = 0; j < voices.length; j++) {
      if (voices[j].name.indexOf(prefs[i]) >= 0 || voices[j].lang.indexOf("de") === 0) {
        germVoice = voices[j];
        break;
      }
    }
    if (germVoice) break;
  }
  var st = document.getElementById("voiceStatus");
  if (germVoice) { st.textContent = "OK"; st.className = "voice-status ok"; }
  else { st.textContent = "keine DE"; st.className = "voice-status warn"; }
}
if (synth && synth.onvoiceschanged !== undefined) { synth.onvoiceschanged = loadVoices; }
setTimeout(loadVoices, 500);

function speak(text) {
  if (!synth) return;
  try { synth.cancel(); } catch(e) {}
  try {
    var u = new SpeechSynthesisUtterance(text);
    u.volume = vol; u.rate = 0.95; u.lang = "de-DE";
    if (germVoice) u.voice = germVoice;
    synth.speak(u);
  } catch(e) {}
}

function unlockAudio() {
  if (!synth) return;
  try { var u = new SpeechSynthesisUtterance(" "); u.volume = 0.01; synth.speak(u); } catch(e) {}
}

function updateVol() {
  vol = parseFloat(document.getElementById("volRange").value);
}

// Build UI
function buildExList() {
  var html = "";
  for (var i = 0; i < EXERCISES.length; i++) {
    html += "<div class='ex-row' id='row" + i + "'>";
    html += "<div class='ex-dot'></div>";
    html += "<div class='ex-name-list'>" + EXERCISES[i].name + "</div>";
    html += "</div>";
  }
  document.getElementById("exList").innerHTML = html;
}

function buildDots() {
  var html = "";
  var total = ROUNDS * EXERCISES.length;
  for (var i = 0; i < total; i++) {
    html += "<div class='op-dot' id='dot" + i + "'></div>";
  }
  document.getElementById("dotsRow").innerHTML = html;
}

buildExList();
buildDots();

function updateUI() {
  var timerEl = document.getElementById("bigTimer");
  var phaseEl = document.getElementById("phaseLabel");
  var nameEl = document.getElementById("exerciseName");
  var noteEl = document.getElementById("exerciseNote");
  var barEl = document.getElementById("progressBar");
  var pct = phaseDur > 0 ? ((phaseDur - elapsed) / phaseDur) * 100 : 100;

  timerEl.textContent = secsLeft < 0 ? "0" : secsLeft;

  if (phase === "prep") {
    phaseEl.textContent = "VORBEREITUNG"; phaseEl.className = "phase-label";
    nameEl.textContent = "Gleich geht es los";
    noteEl.textContent = "Matte ausrollen, locker schuetteln";
    timerEl.className = "big-timer";
    barEl.style.background = "var(--muted)";
    barEl.style.width = pct + "%";
    document.getElementById("roundDisplay").textContent = "1";
    document.getElementById("exerciseDisplay").textContent = "1";

  } else if (phase === "work") {
    var ex = EXERCISES[curEx];
    phaseEl.textContent = "ARBEIT"; phaseEl.className = "phase-label work";
    nameEl.textContent = ex.name;
    noteEl.textContent = ex.note;
    timerEl.className = secsLeft <= 5 ? "big-timer danger" : "big-timer work";
    barEl.style.background = secsLeft <= 5 ? "var(--terra)" : "var(--sage)";
    barEl.style.width = pct + "%";
    document.getElementById("roundDisplay").textContent = curRound + 1;
    document.getElementById("exerciseDisplay").textContent = curEx + 1;

  } else if (phase === "rest") {
    phaseEl.textContent = "PAUSE"; phaseEl.className = "phase-label rest";
    var nextIdx = (curEx + 1) % EXERCISES.length;
    var isLast = curEx === EXERCISES.length - 1;
    nameEl.textContent = isLast ? "Rundenende" : "Naechste: " + EXERCISES[nextIdx].name;
    noteEl.textContent = "Durchatmen, kurz entspannen";
    timerEl.className = "big-timer rest";
    barEl.style.background = "var(--gold)";
    barEl.style.width = pct + "%";
    document.getElementById("roundDisplay").textContent = curRound + 1;
    document.getElementById("exerciseDisplay").textContent = curEx + 1;

  } else if (phase === "roundrest") {
    phaseEl.textContent = "RUNDENPAUSE"; phaseEl.className = "phase-label rest";
    nameEl.textContent = "Runde " + (curRound + 1) + " geschafft!";
    noteEl.textContent = "Kurz verschnaufen, Wasser trinken";
    timerEl.className = "big-timer rest";
    barEl.style.background = "var(--gold)";
    barEl.style.width = pct + "%";

  } else if (phase === "done") {
    phaseEl.textContent = "FERTIG!"; phaseEl.className = "phase-label done";
    nameEl.textContent = "Geschafft!";
    noteEl.textContent = "Tolle Leistung! Jetzt dehnen.";
    timerEl.textContent = "OK";
    timerEl.className = "big-timer work";
    barEl.style.width = "100%";
    barEl.style.background = "var(--sage)";
  }

  // Update ex list
  for (var i = 0; i < EXERCISES.length; i++) {
    var row = document.getElementById("row" + i);
    row.className = "ex-row";
    if (phase === "work" && i === curEx) row.className = "ex-row active";
    else if (phase === "rest" && i === curEx) row.className = "ex-row active";
    else if (phase === "done") row.className = "ex-row done-ex";
    else if ((phase === "work" || phase === "rest") && i < curEx) row.className = "ex-row done-ex";
  }

  // Update dots
  for (var r = 0; r < ROUNDS; r++) {
    for (var ex2 = 0; ex2 < EXERCISES.length; ex2++) {
      var dotEl = document.getElementById("dot" + (r * EXERCISES.length + ex2));
      if (!dotEl) continue;
      if (r < curRound) dotEl.className = "op-dot done-dot";
      else if (r === curRound) {
        if (ex2 < curEx) dotEl.className = "op-dot done-dot";
        else if (ex2 === curEx && phase === "work") dotEl.className = "op-dot active";
        else dotEl.className = "op-dot";
      } else dotEl.className = "op-dot";
    }
  }
  if (phase === "done") {
    for (var i = 0; i < ROUNDS * EXERCISES.length; i++) {
      var d = document.getElementById("dot" + i);
      if (d) d.className = "op-dot done-dot";
    }
  }
}

function startPhase(p, dur, callback) {
  phase = p;
  secsLeft = dur;
  phaseDur = dur;
  elapsed = 0;
  if (callback) callback();
  updateUI();
  if (timer) clearInterval(timer);
  timer = setInterval(function() {
    if (paused) return;
    elapsed++;
    secsLeft--;
    if (secsLeft === 10 && phase === "work") speak("Zehn Sekunden!");
    if (secsLeft === 3 && (phase === "work" || phase === "rest" || phase === "roundrest")) {
      speak("Drei. Zwei. Eins.");
    }
    if (secsLeft <= 0) {
      clearInterval(timer);
      timer = null;
      nextPhase();
      return;
    }
    updateUI();
  }, 1000);
}

function nextPhase() {
  if (phase === "prep") {
    speak(EXERCISES[0].voice);
    startPhase("work", WORK, null);

  } else if (phase === "work") {
    if (curEx < EXERCISES.length - 1) {
      var nextEx = EXERCISES[curEx + 1];
      speak("Pause! Naechste Uebung: " + nextEx.name);
      startPhase("rest", REST, null);
    } else {
      if (curRound < ROUNDS - 1) {
        speak("Runde " + (curRound + 1) + " geschafft! Rundenpause.");
        startPhase("roundrest", ROUND_REST, null);
      } else {
        phase = "done";
        if (timer) clearInterval(timer);
        speak("Training abgeschlossen! Fantastisch!");
        updateUI();
      }
    }

  } else if (phase === "rest") {
    curEx++;
    speak(EXERCISES[curEx].voice);
    startPhase("work", WORK, null);

  } else if (phase === "roundrest") {
    curRound++;
    curEx = 0;
    speak("Runde " + (curRound + 1) + ". Los geht es! " + EXERCISES[0].voice);
    startPhase("work", WORK, null);
  }
}

function handleStart() {
  var btn = document.getElementById("btnStart");
  if (phase === "idle" || phase === "done") {
    curRound = 0; curEx = 0; paused = false;
    btn.textContent = "|| Pause";
    speak("Training beginnt. Bereit machen.");
    startPhase("prep", PREP, null);
  } else if (paused) {
    paused = false;
    btn.textContent = "|| Pause";
    speak("Weiter!");
  } else {
    paused = true;
    btn.textContent = "Weiter";
    speak("Pause.");
  }
}

function resetWorkout() {
  if (timer) clearInterval(timer);
  timer = null;
  phase = "idle"; paused = false;
  secsLeft = 0; curRound = 0; curEx = 0;
  document.getElementById("btnStart").textContent = "Starten";
  document.getElementById("phaseLabel").textContent = "BEREIT";
  document.getElementById("exerciseName").textContent = "Bereit machen";
  document.getElementById("exerciseNote").textContent = "Stell dich locker hin, tief durchatmen";
  document.getElementById("bigTimer").textContent = "-";
  document.getElementById("bigTimer").className = "big-timer";
  document.getElementById("progressBar").style.width = "0%";
  document.getElementById("roundDisplay").textContent = "-";
  document.getElementById("exerciseDisplay").textContent = "-";
  buildExList(); buildDots();
}
</script>
</body>
</html>
