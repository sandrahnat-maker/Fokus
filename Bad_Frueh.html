<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<title>Bad Früh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&family=Raleway:wght@300;400;500&display=swap" rel="stylesheet">
<style>
@keyframes wimpel-swing{0%,100%{transform:rotate(-4deg) skewX(2deg);}50%{transform:rotate(4deg) skewX(-2deg);}}
@keyframes wimpel-swing2{0%,100%{transform:rotate(3deg) skewX(-1deg);}50%{transform:rotate(-3deg) skewX(1deg);}}
@keyframes wimpel-swing3{0%,100%{transform:rotate(-2deg);}50%{transform:rotate(5deg);}}
@keyframes rope-sway{0%,100%{transform:scaleX(1);}50%{transform:scaleX(1.008);}}
@keyframes tier-float{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
@keyframes spotlight{0%{left:-100%;}60%,100%{left:220%;}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
:root{
  --bg:#fdf6ee;--card:#fffbf5;--text:#1e1208;--muted:rgba(30,18,8,0.45);
  --crimson:#b8294a;--crimson-l:rgba(184,41,74,0.10);
  --gold:#c9893a;--gold-l:rgba(201,137,58,0.13);
  --navy:#1a2744;--navy-l:rgba(26,39,68,0.07);
  --sage:#5e8a5a;--sage-l:rgba(94,138,90,0.12);
  --violet:#6a3f7a;
  --border:rgba(184,41,74,0.13);--shadow:rgba(30,18,8,0.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:16px;}
body{
  background:var(--bg);font-family:"Raleway",sans-serif;color:var(--text);
  min-height:100vh;padding-bottom:4rem;
  background-image:repeating-linear-gradient(-6deg,rgba(184,41,74,0.022) 0px,rgba(184,41,74,0.022) 28px,transparent 28px,transparent 56px,rgba(201,137,58,0.018) 56px,rgba(201,137,58,0.018) 84px,transparent 84px,transparent 112px);
}
.wimpelkette{position:relative;width:100%;height:40px;overflow:hidden;display:block;background:var(--bg);}
.wimpelkette svg{width:100%;height:40px;overflow:visible;animation:rope-sway 5s ease-in-out infinite;}
.wimpel-1{animation:wimpel-swing 2.8s ease-in-out infinite;}
.wimpel-2{animation:wimpel-swing2 3.2s ease-in-out infinite 0.3s;}
.wimpel-3{animation:wimpel-swing3 2.5s ease-in-out infinite 0.6s;}
.wimpel-4{animation:wimpel-swing 3.0s ease-in-out infinite 0.9s;}
.wimpel-5{animation:wimpel-swing2 2.7s ease-in-out infinite 1.2s;}
.wimpel-6{animation:wimpel-swing3 3.4s ease-in-out infinite 1.5s;}
.wimpel-7{animation:wimpel-swing 2.9s ease-in-out infinite 1.8s;}
.wimpel-8{animation:wimpel-swing2 2.6s ease-in-out infinite 2.1s;}
.wimpel-9{animation:wimpel-swing3 3.1s ease-in-out infinite 2.4s;}
header{padding:1rem 1.2rem .85rem;border-bottom:2px solid var(--border);background:rgba(255,251,245,0.92);backdrop-filter:blur(3px);position:relative;}
.back-btn{display:inline-flex;align-items:center;gap:.3rem;font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--crimson);text-decoration:none;opacity:.7;margin-bottom:.4rem;background:none;border:none;cursor:pointer;padding:0;}
.back-btn:active{opacity:1;}
.header-eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem;font-weight:500;}
.header-title{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;color:var(--text);line-height:1.2;}
.header-sub{font-family:"IM Fell English",serif;font-size:14px;font-style:italic;color:var(--muted);margin-top:.15rem;}
.rainbow-stripe{height:5px;background:repeating-linear-gradient(90deg,var(--crimson) 0%,var(--crimson) 20%,var(--gold) 20%,var(--gold) 40%,var(--navy) 40%,var(--navy) 60%,var(--violet) 60%,var(--violet) 80%,var(--sage) 80%,var(--sage) 100%);opacity:.6;margin-bottom:.2rem;}
.z-card{background:var(--card);border-radius:12px;border:1px solid var(--border);box-shadow:0 3px 16px var(--shadow);margin:.5rem 1rem;overflow:hidden;position:relative;}
.z-card::after{content:'';position:absolute;top:0;left:-100%;width:55%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.055),transparent);animation:spotlight 10s ease-in-out infinite;pointer-events:none;}
.z-item{display:flex;align-items:flex-start;gap:.6rem;padding:.55rem .9rem;border-bottom:1px solid rgba(184,41,74,0.07);cursor:pointer;-webkit-tap-highlight-color:transparent;transition:opacity .2s;}
.z-item:last-child{border-bottom:none;}
.z-item.done{opacity:.28;}
.z-item.done .z-name{text-decoration:line-through;text-decoration-color:rgba(184,41,74,0.3);}
.z-check{width:18px;height:18px;border-radius:50%;border:1.5px solid rgba(184,41,74,0.3);flex-shrink:0;margin-top:2px;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;}
.z-item.done .z-check{background:var(--sage-l);border-color:var(--sage);color:var(--sage);}
.z-item.done .z-check::after{content:"✦";}
.z-name{font-size:16px;color:var(--text);line-height:1.35;}
.z-sub{font-size:13px;font-style:italic;color:var(--muted);margin-top:1px;font-family:"IM Fell English",serif;}
.z-sec{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--crimson);padding:.7rem 1rem .2rem;opacity:.8;font-weight:500;}
.z-info{margin:.3rem 1rem .4rem;padding:.5rem .8rem;background:var(--gold-l);border-left:2px solid var(--gold);font-family:"IM Fell English",serif;font-style:italic;font-size:14px;color:var(--muted);line-height:1.6;}
.section-label{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin:.8rem 1rem .3rem;padding-left:.2rem;font-weight:500;}
.z-progress{margin:.4rem 1rem .2rem;}
.z-progress-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:.3rem;}
.z-progress-bar{height:3px;background:var(--border);border-radius:10px;overflow:hidden;}
.z-progress-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--gold));border-radius:10px;transition:width .4s ease;}
.z-reset{position:fixed;bottom:1.2rem;right:1.2rem;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:.4rem 1rem;font-size:13px;font-family:"IM Fell English",serif;font-style:italic;cursor:pointer;}
.z-reset:active{background:var(--crimson-l);color:var(--crimson);}
.tier-zeile{display:flex;align-items:center;justify-content:center;gap:.2rem;padding:.3rem 1rem;user-select:none;pointer-events:none;overflow:hidden;}
.tier-zeile .tier{display:inline-block;animation:tier-float 3s ease-in-out infinite;opacity:.5;font-size:.9rem;}
.tier-zeile .tier:nth-child(2){animation-delay:.4s;}.tier-zeile .tier:nth-child(3){animation-delay:.8s;}.tier-zeile .tier:nth-child(4){animation-delay:1.2s;}.tier-zeile .tier:nth-child(5){animation-delay:1.6s;}
.tier-linie{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(184,41,74,0.2),transparent);}
.manege-line{display:flex;align-items:center;gap:.5rem;padding:.1rem 1rem;color:var(--crimson);opacity:.3;font-size:11px;letter-spacing:.3em;user-select:none;}
.manege-line::before,.manege-line::after{content:'';flex:1;height:1px;background:currentColor;}
</style>

<style>
/* App-spezifisches CSS */
h1{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;font-weight:400;color:var(--text);margin-bottom:.15rem}
.sub{font-size:13px;color:var(--muted);font-style:italic;margin-bottom:.8rem}
.prog-row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:.2rem}
.prog-bg{background:var(--border);border-radius:3px;height:3px;margin-bottom:.8rem;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--sage),var(--gold));border-radius:3px;transition:width .3s}
.section{font-size:11px;font-weight:400;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin:.85rem 0 .4rem .05rem}
.item{background:var(--white);border-radius:12px;padding:.6rem .85rem;margin-bottom:.35rem;display:flex;align-items:center;gap:.65rem;cursor:pointer;border:1px solid var(--border);transition:all .18s;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 6px rgba(180,120,40,0.04)}
.item:active{transform:scale(.98)}
.item.done{opacity:.38}
.item.done .iname{text-decoration:line-through;color:var(--muted)}
.cb{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(180,130,70,0.3);background:transparent;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;font-size:12px;color:#fff}
.item.done .cb{background:var(--sage);border-color:var(--sage)}
.cbx{display:none}
.item.done .cbx{display:block}
.ico{font-size:1.1rem;flex-shrink:0}
.iinfo{flex:1}
.iname{font-size:16px;font-weight:600;line-height:1.3}
.idesc{font-size:13px;color:var(--muted);margin-top:.05rem;line-height:1.4;font-style:italic}
.itip{font-size:12px;color:var(--sage);margin-top:.1rem;font-style:italic}
.app-item{background:var(--sage);border-radius:12px;padding:.6rem .85rem;margin-bottom:.35rem;display:flex;align-items:center;gap:.65rem;cursor:pointer;border:none;width:100%;font-family:inherit;-webkit-tap-highlight-color:transparent}
.app-item .iname{color:#fff;font-size:16px;font-weight:400;font-family:"Cormorant Garamond",serif}
.app-item .idesc{color:rgba(255,255,255,.8);font-size:13px;font-style:italic}
.app-item .ico{font-size:1.1rem}
.reset-btn{position:fixed;bottom:1rem;right:1rem;background:var(--gold);color:#fff;border:none;border-radius:20px;padding:.4rem 1.1rem;font-size:14px;cursor:pointer;font-family:"Cormorant Garamond",serif}
.w2w-btn{display:inline-block;margin-top:.3rem;background:var(--gold);color:#fff;border-radius:20px;padding:.25rem .7rem;font-size:13px;text-decoration:none;}
.done-banner{background:linear-gradient(135deg,#f5ede0,#faf3e8);border-radius:14px;padding:.8rem 1rem;margin-bottom:.8rem;text-align:center;display:none;border:1px solid var(--border)}
.done-banner.show{display:block}
.done-banner p{color:var(--text);font-family:"Playfair Display",serif;font-size:18px;font-style:italic;font-weight:400}
.done-banner span{color:var(--muted);font-size:13px;font-style:italic}
</style>
</head>
<body>
<div class="wimpelkette" aria-hidden="true"><svg viewBox="0 0 400 44" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg"><path d="M0,7 Q50,11 100,9 Q150,7 200,10 Q250,13 300,9 Q350,7 400,9" stroke="#1a2744" stroke-width="1" fill="none" opacity="0.3"/><g class="wimpel-1" transform-origin="30 9"><polygon points="23,9 37,9 30,28" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-2" transform-origin="67 9"><polygon points="60,9 74,9 67,28" fill="#c9893a" opacity="0.8"/></g><g class="wimpel-3" transform-origin="104 9"><polygon points="97,9 111,9 104,28" fill="#1a2744" opacity="0.75"/></g><g class="wimpel-4" transform-origin="141 9"><polygon points="134,9 148,9 141,28" fill="#6a3f7a" opacity="0.75"/></g><g class="wimpel-5" transform-origin="178 10"><polygon points="171,10 185,10 178,29" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-6" transform-origin="215 9"><polygon points="208,9 222,9 215,28" fill="#5e8a5a" opacity="0.7"/></g><g class="wimpel-7" transform-origin="252 10"><polygon points="245,10 259,10 252,29" fill="#c9893a" opacity="0.8"/></g><g class="wimpel-8" transform-origin="289 9"><polygon points="282,9 296,9 289,28" fill="#b8294a" opacity="0.8"/></g><g class="wimpel-9" transform-origin="326 9"><polygon points="319,9 333,9 326,28" fill="#1a2744" opacity="0.75"/></g><g class="wimpel-1" transform-origin="363 9"><polygon points="356,9 370,9 363,28" fill="#6a3f7a" opacity="0.75"/></g></svg></div>
<header>
<div class="rainbow-stripe"></div>
<div class="header-eyebrow">Morgenritual</div>
<div class="header-title">Bad Früh</div>
<div class="header-sub">Weleda · sanft in den Tag</div>
</header>
<p class="sub">Mein Morgenritual · sanft &amp; bewusst · ~15 Min</p>

<div class="prog-row"><span id="plbl">0 von 0</span><span id="ppct">0%</span></div>
<div class="prog-bg"><div class="prog-fill" id="pb" style="width:0%"></div></div>

<div class="done-banner" id="doneBanner">
  <p>&#x2728; Fertig!</p>
  <span>Fertig — du strahlst. 🌿</span>
</div>

<div id="list"></div>

<button class="reset-btn" onclick="resetAll()">↺ Neu</button>

<script>
var SECTIONS = [
  {
    label: "&#x1F9B7; Mundhygiene",
    items: [
      {id:'zaehne', ico:'&#x1FAA5;', name:'Zähne putzen', desc:'2 Min · elektrische Bürste · alle Flächen', tip:'Nicht zu fest drücken'},
      {id:'zahnseide', ico:'&#x1F9F5;', name:'Zahnseide', desc:'Alle Zahnzwischenräume · vor dem Bürsten ist besser'},
      {id:'mund', ico:'&#x1F4A7;', name:'Mundspülung', desc:'30 Sek spülen · nicht nachspülen mit Wasser'},
    ]
  },
  {
    label: "&#x1F485; Nägel & Brauen",
    items: [
      {id:'naegel', ico:'&#x1F485;', name:'Nägel reinigen', desc:'Nagelbürste · besonders nach draußen wichtig'},
      {id:'brauen', ico:'&#x1F98B;', name:'Augenbrauen', desc:'Bürstchen · in Wuchsrichtung · formen wenn nötig'},
    ]
  },
  {
    label: "&#x1F338; Gesicht (minimal · vor Sport)",
    items: [
      {id:'reinigung', ico:'&#x1FAE7;', name:'Reinigungsmilch', desc:'Lavera Basis Sensitiv · kurz einmassieren · abwaschen', tip:'Kein heißes Wasser · lauwarm'},
      {id:'serum', ico:'&#x2728;', name:'Feuchtigkeitsserum', desc:'Lavera 3-fach Hyaluron · 2–3 Tropfen · eintippen', tip:'Nicht einreiben – leicht eintippen'},
      {id:'creme', ico:'&#x1F331;', name:'Leichte Tagescreme', desc:'Lavera My Age · dünn auftragen · vor Sonnencreme'},
      {id:'sonne', ico:'&#x2600;&#xFE0F;', name:'Sonnencreme LSF 30', desc:'Lavera Anti-Age · täglich auch im Winter! · letzter Schritt', tip:'Auch bei Bewölkung – UV-Strahlung ist immer da'},
    ]
  },
  {
    label: "&#x1F9B1; Haare",
    items: [
      {id:'haare', ico:'&#x1F9B1;', name:'Haare', desc:'Kämmen · stylen · bei Bedarf binden für Sport'},
      {id:'anziehen', ico:'&#x1F455;', name:'Anziehen', desc:'Fertig! &#x1F4F1;', w2w:true},
    ]
  },
  {
    label: "&#x1F484; Make-up",
    items: [
      {id:'bb', ico:'&#x1F484;', name:'BB Cream / Tinted Moisturizer', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Tinted Moisturizer · oder Benecos BB Cream · leichte Grundierung'},
      {id:'concealer', ico:'&#x1F484;', name:'Concealer', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Natural Concealer · unter Augen sanft eintippen'},
      {id:'highlighter', ico:'&#x2728;', name:'Highlighter', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Illuminating Powder · Jochbein &amp; Nasenrücken'},
      {id:'brauen_mu', ico:'&#x1F484;', name:'Augenbrauen', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Brow Styler dunkelbraun · haarfeine Striche in Wuchsrichtung'},
      {id:'lidschatten', ico:'&#x1F484;', name:'Lidschatten', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Quattro warm tones · Bronze/Kupfer/Braun für blaue Augen'},
      {id:'eyeliner', ico:'&#x1F484;', name:'Eyeliner', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Eyeliner braun · dünn · nur Oberlid'},
      {id:'mascara', ico:'&#x1F484;', name:'Mascara', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Mascara Volume · nur Oberwimpern'},
      {id:'blush', ico:'&#x1F338;', name:'Blush / Rouge', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Natural Blush rosé · Wangenäpfel · lächeln beim Auftragen'},
      {id:'lip_liner', ico:'&#x1F484;', name:'Lip Liner', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Lip Liner nude rose · Lippenkontur zuerst'},
      {id:'lipstick', ico:'&#x1F484;', name:'Lippenstift', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Natural Lip Colour mauve rose · auf Liner auftragen'},
      {id:'lipgloss', ico:'&#x1F484;', name:'Lip Gloss', desc:'<span style="font-size:11px;background:rgba(122,154,90,0.12);color:#7a9a5a;border-radius:4px;padding:.05rem .3rem;margin-right:.3rem;">Lavera</span>Lip Gloss transparent · nur Lippenmitte · macht voller'},
    ]
  },
];

var KEY = 'bad_frueh_v1';
var checked = {};

function load() {
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) checked = JSON.parse(raw);
    var sd = localStorage.getItem(KEY + '_d');
    var td = new Date().toISOString().slice(0,10);
    if (sd !== td) { checked = {}; save(); localStorage.setItem(KEY + '_d', td); }
  } catch(e) {}
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(checked)); } catch(e) {}
  try { if(window.parent) window.parent._bad_frueh_data = JSON.stringify(checked); } catch(e) {}
}
function toggle(id) { checked[id] = !checked[id]; save(); render(); }
function resetAll() { checked = {}; save(); render(); }

function getAllItems() {
  var all = [];
  SECTIONS.forEach(function(s){ s.items.forEach(function(i){ all.push(i); }); });
  return all;
}

function openAnziehen() {
  try {
    var p = window.parent || window.top;
    if (p && p.openApp) { p.openApp('Fertigmachen_Frueh', '\uD83D\uDC55 Anziehen'); return; }
  } catch(e) {}
  alert('Bitte über den Kalender öffnen');
}

function render() {
  var all = getAllItems();
  var done = all.filter(function(i){ return !!checked[i.id]; }).length;
  var total = all.length;
  var pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('plbl').textContent = done + ' von ' + total;
  document.getElementById('ppct').textContent = pct + '%';
  document.getElementById('pb').style.width = pct + '%';
  document.getElementById('doneBanner').className = 'done-banner' + (done===total&&total>0?' show':'');

  var h = '';var inCard=false;
  SECTIONS.forEach(function(sec) {
    h += '<div class="z-sec">' + sec.label + '</div>';
    sec.items.forEach(function(item) {
      var d = !!checked[item.id];
      h += '<div class="item' + (d?' done':'') + '" onclick="toggle(\'' + item.id + '\')">'
        + '<div class="z-check"><svg class="cbx" width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'
        + '<span class="ico">' + item.ico + '</span>'
        + '<div class="z-sub-wrap"><div class="z-name">' + item.name + '</div>'
        + '<div class="z-sub">' + item.desc + '</div>'
        + (item.tip ? '<div class="z-info">&#x1F4A1; ' + item.tip + '</div>' : '')
        + '</div></div>';
    });
  });

  // Anziehen als normaler Schritt
  h += '<div class="section">&#x1F455; Abschluss</div>';

  if(inCard)h+='</div>';
  document.getElementById('list').innerHTML = h;
}

load();
render();
</script>
</body>
</html>
