<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bad Früh</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gelb:#FFD93D;--rot:#E84855;--blau:#3D87CB;--grün:#4CAF72;--orange:#FF6B35;--lila:#9B5DE5;--creme:#FFF8E7;--dunkel:#1a0a00;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--creme);font-family:'Nunito',sans-serif;color:var(--dunkel);min-height:100vh;padding-bottom:5rem;
  background-image:repeating-linear-gradient(-12deg,transparent 0,transparent 60px,rgba(255,217,61,.06) 60px,rgba(255,217,61,.06) 80px,transparent 80px,transparent 140px,rgba(232,72,85,.04) 140px,rgba(232,72,85,.04) 160px);}
.vk-header{background:var(--blau);border-bottom:3px solid var(--dunkel);padding:.8rem 1.1rem .7rem;}
.vk-header::before{content:'';display:block;height:6px;margin-bottom:.5rem;background:repeating-linear-gradient(90deg,var(--rot) 0,var(--rot) 20%,var(--gelb) 20%,var(--gelb) 40%,var(--grün) 40%,var(--grün) 60%,var(--blau) 60%,var(--blau) 80%,var(--lila) 80%,var(--lila) 100%);border-radius:3px;}
.vk-back{display:inline-flex;align-items:center;gap:.3rem;font-family:'Caveat',cursive;font-size:1rem;color:white;text-decoration:none;background:none;border:none;cursor:pointer;opacity:.8;margin-bottom:.3rem;padding:0;}
.vk-eyebrow{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;opacity:.7;font-weight:700;margin-bottom:.15rem;color:white;}
.vk-title{font-family:'Fredoka One',cursive;font-size:1.8rem;line-height:1.1;color:white;}
.vk-sub{font-family:'Caveat',cursive;font-size:1rem;opacity:.75;margin-top:.1rem;color:white;}
.vk-progress{margin:1rem 1rem 0;padding:.8rem 1rem;background:white;border:3px solid var(--dunkel);border-radius:14px;box-shadow:3px 3px 0 var(--dunkel);}
.vk-prog-row{display:flex;justify-content:space-between;font-family:'Fredoka One',cursive;font-size:.95rem;margin-bottom:.4rem;}
.vk-prog-bar{height:12px;background:rgba(26,10,0,.1);border-radius:20px;overflow:hidden;border:2px solid var(--dunkel);}
.vk-prog-fill{height:100%;background:linear-gradient(90deg,var(--blau),var(--grün));border-radius:20px;transition:width .4s;}
.vk-fertig{display:none;background:var(--grün);border:3px solid var(--dunkel);border-radius:14px;margin:1rem 1rem 0;padding:.7rem 1rem;text-align:center;box-shadow:4px 4px 0 var(--dunkel);}
.vk-fertig.sichtbar{display:block;}
.vk-fertig-text{font-family:'Fredoka One',cursive;font-size:1.1rem;color:white;}
.vk-section{font-family:'Fredoka One',cursive;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:var(--blau);padding:.6rem 1rem .2rem;opacity:.9;}
.vk-card{background:white;border:3px solid var(--dunkel);border-radius:16px;box-shadow:4px 4px 0 var(--dunkel);margin:.3rem 1rem 0;overflow:hidden;}
.vk-item{display:flex;align-items:flex-start;gap:.65rem;padding:.6rem 1rem;border-bottom:2px dashed rgba(26,10,0,.1);cursor:pointer;transition:background .15s;}
.vk-item:last-child{border-bottom:none;}
.vk-item:active{background:rgba(61,135,203,.15);}
.vk-item.erledigt{opacity:.3;}
.vk-item.erledigt .vk-name{text-decoration:line-through;}
.vk-kreis{width:24px;height:24px;border:3px solid var(--dunkel);border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:white;transition:all .2s;}
.vk-item.erledigt .vk-kreis{background:var(--grün);border-color:var(--grün);color:white;}
.vk-ico{font-size:1.1rem;flex-shrink:0;margin-top:2px;}
.vk-inhalt{flex:1;}
.vk-name{font-size:1rem;font-weight:700;line-height:1.3;}
.vk-desc{font-family:'Caveat',cursive;font-size:1rem;color:rgba(26,10,0,.55);margin-top:.05rem;}
.vk-tip{font-size:.8rem;background:rgba(255,217,61,.3);border-left:3px solid var(--gelb);padding:.2rem .5rem;margin-top:.3rem;border-radius:0 6px 6px 0;font-style:italic;}
.vk-reset{position:fixed;bottom:1.2rem;right:1.2rem;background:white;border:3px solid var(--dunkel);border-radius:20px;padding:.4rem 1rem;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;box-shadow:3px 3px 0 var(--dunkel);}
.vk-reset:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--dunkel);}
</style>
</head>
<body>
<div class="vk-header">
  <button class="vk-back" onclick="history.back()">← zurück</button>
  <div class="vk-eyebrow">Morgenritual</div>
  <div class="vk-title">🪥 Bad Früh</div>
  <div class="vk-sub">Weleda · sanft in den Tag</div>
</div>

<div class="vk-progress">
  <div class="vk-prog-row">
    <span id="plbl">0 von 0</span>
    <span id="ppct">0%</span>
  </div>
  <div class="vk-prog-bar"><div class="vk-prog-fill" id="pb" style="width:0%"></div></div>
</div>

<div class="vk-fertig" id="doneBanner">
  <div class="vk-fertig-text">✦ Fertig! Du glänzt! ✦</div>
</div>

<div id="list"></div>
<button class="vk-reset" onclick="resetAll()">↺ Neu</button>

<script>
var SECTIONS=[
  {label:"🦷 Mundhygiene",items:[
    {id:'zaehne',ico:'🪥',name:'Zähne putzen',desc:'2 Min · elektrische Bürste · alle Flächen',tip:'Nicht zu fest drücken'},
    {id:'zahnseide',ico:'🧵',name:'Zahnseide',desc:'Alle Zahnzwischenräume · vor dem Bürsten ist besser'},
    {id:'mund',ico:'💧',name:'Mundspülung',desc:'30 Sek spülen · nicht nachspülen mit Wasser'},
  ]},
  {label:"💅 Nägel & Brauen",items:[
    {id:'naegel',ico:'💅',name:'Nägel reinigen',desc:'Nagelbürste · besonders nach draußen wichtig'},
    {id:'brauen',ico:'🦋',name:'Augenbrauen',desc:'Bürstchen · in Wuchsrichtung · formen wenn nötig'},
  ]},
  {label:"🌸 Gesicht",items:[
    {id:'reinigung',ico:'🫧',name:'Reinigungsmilch',desc:'Lavera Basis Sensitiv · kurz einmassieren · abwaschen',tip:'Kein heißes Wasser · lauwarm'},
    {id:'serum',ico:'✨',name:'Feuchtigkeitsserum',desc:'Lavera 3-fach Hyaluron · 2–3 Tropfen · eintippen',tip:'Nicht einreiben – leicht eintippen'},
    {id:'creme',ico:'🌿',name:'Leichte Tagescreme',desc:'Lavera My Age · dünn auftragen · vor Sonnencreme'},
    {id:'sonne',ico:'☀️',name:'Sonnencreme LSF 30',desc:'Lavera Anti-Age · täglich auch im Winter!',tip:'Auch bei Bewölkung – UV-Strahlung ist immer da'},
  ]},
  {label:"🦱 Haare",items:[
    {id:'haare',ico:'🦱',name:'Haare',desc:'Kämmen · stylen · bei Bedarf binden für Sport'},
    {id:'anziehen',ico:'👗',name:'Anziehen',desc:'Fertig! 🎪'},
  ]},
  {label:"💄 Make-up",items:[
    {id:'bb',ico:'💄',name:'BB Cream / Tinted Moisturizer',desc:'Lavera Tinted Moisturizer · leichte Grundierung'},
    {id:'concealer',ico:'💄',name:'Concealer',desc:'Lavera Natural Concealer · unter Augen sanft eintippen'},
    {id:'highlighter',ico:'✨',name:'Highlighter',desc:'Lavera Illuminating Powder · Jochbein & Nasenrücken'},
    {id:'brauen_mu',ico:'💄',name:'Augenbrauen',desc:'Lavera Brow Styler dunkelbraun · haarfeine Striche'},
    {id:'lidschatten',ico:'💄',name:'Lidschatten',desc:'Lavera Quattro warm tones · Bronze/Kupfer/Braun'},
    {id:'eyeliner',ico:'💄',name:'Eyeliner',desc:'Lavera Eyeliner braun · dünn · nur Oberlid'},
    {id:'mascara',ico:'💄',name:'Mascara',desc:'Lavera Mascara Volume · nur Oberwimpern'},
    {id:'blush',ico:'🌸',name:'Blush / Rouge',desc:'Lavera Natural Blush rosé · lächeln beim Auftragen'},
    {id:'lip_liner',ico:'💄',name:'Lip Liner',desc:'Lavera Lip Liner nude rose · Lippenkontur zuerst'},
    {id:'lipstick',ico:'💄',name:'Lippenstift',desc:'Lavera Natural Lip Colour mauve rose'},
    {id:'lipgloss',ico:'💄',name:'Lip Gloss',desc:'Lavera Lip Gloss transparent · nur Lippenmitte'},
  ]},
];

var KEY='bad_frueh_v1';
var checked={};

function load(){
  try{
    var raw=localStorage.getItem(KEY);
    if(raw)checked=JSON.parse(raw);
    var sd=localStorage.getItem(KEY+'_d');
    var td=new Date().toISOString().slice(0,10);
    if(sd!==td){checked={};save();localStorage.setItem(KEY+'_d',td);}
  }catch(e){}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(checked));}catch(e){}}
function toggle(id){checked[id]=!checked[id];save();render();}
function resetAll(){checked={};save();render();}
function getAllItems(){var all=[];SECTIONS.forEach(function(s){s.items.forEach(function(i){all.push(i);});});return all;}

function render(){
  var all=getAllItems();
  var done=all.filter(function(i){return!!checked[i.id];}).length;
  var total=all.length;
  var pct=total?Math.round(done/total*100):0;
  document.getElementById('plbl').textContent=done+' von '+total;
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('doneBanner').className='vk-fertig'+(done===total&&total>0?' sichtbar':'');

  var h='';
  SECTIONS.forEach(function(sec){
    h+='<div class="vk-section">'+sec.label+'</div><div class="vk-card">';
    sec.items.forEach(function(item){
      var d=!!checked[item.id];
      h+='<div class="vk-item'+(d?' erledigt':'')+'" onclick="toggle(\''+item.id+'\')">'
        +'<div class="vk-kreis">'+(d?'✓':'')+'</div>'
        +'<div class="vk-ico">'+item.ico+'</div>'
        +'<div class="vk-inhalt"><div class="vk-name">'+item.name+'</div>'
        +'<div class="vk-desc">'+item.desc+'</div>'
        +(item.tip?'<div class="vk-tip">💡 '+item.tip+'</div>':'')
        +'</div></div>';
    });
    h+='</div>';
  });
  document.getElementById('list').innerHTML=h;
}
load();render();
</script>
</body>
</html>
