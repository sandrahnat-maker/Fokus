<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Dozen + GLP-1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --sage:#6B8F71; --sage-l:#EAF0EB;
    --amber:#C97D3A; --amber-l:#FDF3E7;
    --cream:#F8F5F0; --ink:#1E1E1E; --muted:#7A7A7A; --white:#FFFFFF; --r:12px;
  }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--ink); padding-bottom:40px; }

  header { background:var(--sage); color:var(--white); padding:18px 16px 14px; }
  header h1 { font-family:'DM Serif Display',serif; font-size:1.35rem; font-weight:400; }
  header p  { font-size:0.72rem; opacity:0.8; margin-top:2px; }
  .prog-wrap  { margin-top:10px; background:rgba(255,255,255,0.25); border-radius:99px; height:5px; overflow:hidden; }
  .prog-fill  { height:100%; background:#fff; border-radius:99px; transition:width 0.3s; }
  .prog-label { display:flex; justify-content:space-between; margin-top:4px; font-size:0.7rem; opacity:0.85; align-items:center; }
  .reset-btn  { background:none; border:1px solid rgba(255,255,255,0.5); color:#fff; border-radius:99px; padding:2px 9px; font-size:0.67rem; cursor:pointer; font-family:'DM Sans',sans-serif; }

  .legend { display:flex; gap:12px; padding:8px 14px 2px; font-size:0.67rem; color:var(--muted); flex-wrap:wrap; align-items:center; }
  .legend span { display:flex; align-items:center; gap:4px; }
  .dot { width:7px; height:7px; border-radius:50%; }
  .dot-g { background:var(--sage); } .dot-a { background:var(--amber); }

  /* MEAL SECTION */
  .meal { margin:10px 12px 0; }
  .meal-header {
    display:flex; align-items:center; gap:8px;
    padding:8px 12px;
    background:var(--sage); color:var(--white);
    border-radius:var(--r) var(--r) 0 0;
    font-size:0.85rem; font-weight:600;
  }
  .meal-header.mid { background:#5a7a8a; }
  .meal-header.eve { background:#4a5568; }
  .meal-count { margin-left:auto; font-size:0.7rem; opacity:0.8; font-weight:400; }

  .meal-body { background:var(--white); border-radius:0 0 var(--r) var(--r); overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,0.07); }
  .empty-hint { padding:14px 16px; color:var(--muted); font-size:0.78rem; text-align:center; }

  /* ITEM */
  .item {
    display:grid;
    grid-template-columns: 24px 1rem 1fr auto;
    align-items:center; gap:9px;
    padding:10px 12px;
    border-bottom:1px solid #f0f0f0;
    transition:background 0.15s;
  }
  .item:last-child { border-bottom:none; }
  .item.done { background:var(--sage-l); }
  .item.done .iname { color:var(--sage); text-decoration:line-through; }
  .item.done .inote { color:var(--sage); opacity:0.6; }
  .item.glp.done { background:var(--amber-l); }
  .item.glp.done .iname { color:var(--amber); }
  .item.glp.done .inote { color:var(--amber); opacity:0.6; }

  .check {
    width:22px; height:22px; border-radius:50%;
    border:2px solid #ddd; display:flex; align-items:center; justify-content:center;
    font-size:11px; cursor:pointer; flex-shrink:0; transition:all 0.18s; color:transparent;
  }
  .item.done     .check { background:var(--sage);  border-color:var(--sage);  color:#fff; }
  .item.glp.done .check { background:var(--amber); border-color:var(--amber); color:#fff; }

  .iemoji { font-size:0.95rem; }
  .itext  { min-width:0; }
  .iname  { font-size:0.82rem; font-weight:500; line-height:1.2; }
  .inote  { font-size:0.65rem; color:var(--muted); margin-top:1px; line-height:1.3; }

  /* MOVE BUTTONS */
  .move-btns { display:flex; flex-direction:column; gap:2px; flex-shrink:0; }
  .mbtn {
    background:none; border:1px solid #e0e0e0; border-radius:5px;
    width:26px; height:20px; font-size:0.7rem; cursor:pointer; color:var(--muted);
    display:flex; align-items:center; justify-content:center;
    transition:background 0.15s, color 0.15s;
    line-height:1;
  }
  .mbtn:hover { background:var(--sage-l); color:var(--sage); border-color:var(--sage); }
  .mbtn:disabled { opacity:0.2; cursor:default; }
  .mbtn:disabled:hover { background:none; color:var(--muted); border-color:#e0e0e0; }

  .done-msg { text-align:center; padding:16px; display:none; }
  .done-msg.visible { display:block; }
  .done-msg .big { font-family:'DM Serif Display',serif; font-size:1.6rem; color:var(--sage); }
  .done-msg p { font-size:0.76rem; color:var(--muted); margin-top:3px; }
</style>
</head>
<body>

<header>
  <h1>Daily Dozen <em style="font-style:italic;opacity:0.85">+ GLP-1</em></h1>
  <p>Tippen zum Abhaken · Pfeile zum Verschieben</p>
  <div class="prog-wrap"><div class="prog-fill" id="bar"></div></div>
  <div class="prog-label">
    <span id="count">0 von 0 erledigt</span>
    <button class="reset-btn" onclick="resetAll()">Zurücksetzen</button>
  </div>
</header>

<div class="legend">
  <span><div class="dot dot-g"></div> Daily Dozen</span>
  <span><div class="dot dot-a"></div> GLP-1 Ergänzung</span>
</div>

<div class="done-msg" id="doneMsg">
  <div class="big">🌿 Perfekt!</div>
  <p>Alle Punkte für heute geschafft.</p>
</div>

<div id="meal-0" class="meal"></div>
<div id="meal-1" class="meal"></div>
<div id="meal-2" class="meal"></div>

<script>
const MEALS = [
  { label:'☀️ Frühstück', cls:'' },
  { label:'🌤️ Mittag',    cls:'mid' },
  { label:'🌙 Abend',     cls:'eve' },
];

const ITEMS = [
  // 🥚 PROTEIN ZUERST – Sättigung von Anfang an
  { id:'ei1',    name:'Ei 1',                      note:'Frühstück – Protein sättigt lang',                 emoji:'🥚', glp:true  },
  { id:'ei2',    name:'Ei 2',                      note:'Frühstück – Protein sättigt lang',                 emoji:'🥚', glp:true  },
  { id:'topf',   name:'Topfen ✊',                 note:'Frühstück – proteinreich, wenig Kalorien',         emoji:'🫙', glp:true  },
  { id:'ferm',   name:'Fermentiertes o. Joghurt/Kefir', note:'Frühstück – Mikrobiom & GLP-1',             emoji:'🥛', glp:true  },
  // 🥦 GEMÜSE – viel Volumen, wenig Kalorien
  { id:'blatt1', name:'Blattgemüse ✊ 1',           note:'Spinat, Mangold, Salat, Grünkohl – roh gehäuft',  emoji:'🥬', glp:false },
  { id:'blatt2', name:'Blattgemüse ✊ 2',           note:'Spinat, Mangold, Salat, Grünkohl – roh gehäuft',  emoji:'🥬', glp:false },
  { id:'kreuz',  name:'Kreuzblütler ✊',            note:'Brokkoli, Blumenkohl, Kohl, Rucola…',             emoji:'🥦', glp:false },
  { id:'gem1',   name:'Anderes Gemüse ✊ 1',        note:'Paprika, Karotten, Zucchini, Tomaten…',           emoji:'🫑', glp:false },
  { id:'gem2',   name:'Anderes Gemüse ✊ 2',        note:'Paprika, Karotten, Zucchini, Tomaten…',           emoji:'🫑', glp:false },
  // 🫘 HÜLSENFRÜCHTE – erhöht auf 4× für mehr Sättigung
  { id:'huel1',  name:'Hülsenfrüchte ✊ 1',        note:'Mittag – Linsen, Bohnen, Kichererbsen',           emoji:'🫘', glp:false },
  { id:'huel2',  name:'Hülsenfrüchte ✊ 2',        note:'Mittag – Linsen, Bohnen, Kichererbsen',           emoji:'🫘', glp:false },
  { id:'huel3',  name:'Hülsenfrüchte ✊ 3',        note:'Abend – Linsen, Bohnen, Kichererbsen',            emoji:'🫘', glp:false },
  { id:'huel4',  name:'Hülsenfrüchte ✊ 4',        note:'Abend – Linsen, Bohnen, Kichererbsen',            emoji:'🫘', glp:false },
  // 🫐 OBST – reduziert auf 2× (weniger Fruchtzucker)
  { id:'beer',   name:'Beeren ✊',                  note:'Frühstück – wenig Zucker, viele Polyphenole',      emoji:'🫐', glp:false },
  { id:'obst1',  name:'Anderes Obst ✊',            note:'Mittag – 1 Stück, lieber Apfel oder Birne',       emoji:'🍎', glp:false },
  // 🌾 VOLLKORN – reduziert auf 2× (mittags, nicht abends)
  { id:'vk1',    name:'Vollkorn ✊ 1',              note:'Frühstück – Haferflocken oder Vollkornbrot',       emoji:'🌾', glp:false },
  { id:'vk2',    name:'Vollkorn ✊ 2',              note:'Mittag – Quinoa oder brauner Reis',                emoji:'🌾', glp:false },
  // 🌰 NÜSSE & SAMEN
  { id:'nuesse', name:'Nüsse ✊ ½',                note:'1× täglich – nicht als Snack zwischendurch',       emoji:'🌰', glp:false },
  { id:'lein',   name:'Leinsamen',                 note:'1 EL gemahlen – ins Frühstück mischen',            emoji:'🌱', glp:false },
  // 🫚 FETTE & WÜRZE
  { id:'oel',    name:'Olivenöl',                  note:'1 TL statt 1 EL – bewusst einsetzen',              emoji:'🫒', glp:false },
  { id:'kurk0',  name:'Kurkuma – Frühstück',       note:'¼ TL – mit Pfeffer für bessere Aufnahme',         emoji:'🟡', glp:false },
  { id:'kurk1',  name:'Kurkuma – Mittag',          note:'¼ TL – mit Pfeffer für bessere Aufnahme',         emoji:'🟡', glp:false },
  { id:'kurk2',  name:'Kurkuma – Abend',           note:'¼ TL – mit Pfeffer für bessere Aufnahme',         emoji:'🟡', glp:false },
  { id:'gew0',   name:'Gewürze – Frühstück',       note:'Zimt senkt Blutzucker – ideal morgens',           emoji:'🌶️', glp:false },
  { id:'gew1',   name:'Gewürze – Mittag',          note:'¼ TL Ingwer oder Knoblauch',                      emoji:'🌶️', glp:false },
  { id:'gew2',   name:'Gewürze – Abend',           note:'¼ TL Ingwer oder Knoblauch',                      emoji:'🌶️', glp:false },
  // 💧 BASIS
  { id:'bew',    name:'Bewegung',                  note:'Mind. 20 Min. – steigert GLP-1-Sensitivität',     emoji:'🚶', glp:false },
  { id:'was1',   name:'Wasser 1. Glas',            note:'Frühstück – vor dem Essen trinken',               emoji:'💧', glp:false },
  { id:'was2',   name:'Wasser 2. Glas',            note:'Frühstück',                                       emoji:'💧', glp:false },
  { id:'was3',   name:'Wasser 3. Glas',            note:'Mittag – vor dem Essen trinken',                  emoji:'💧', glp:false },
  { id:'was4',   name:'Wasser 4. Glas',            note:'Mittag',                                          emoji:'💧', glp:false },
  { id:'was5',   name:'Wasser 5. Glas',            note:'Abend – vor dem Essen trinken',                   emoji:'💧', glp:false },
  { id:'was6',   name:'Wasser 6. Glas',            note:'Abend',                                           emoji:'💧', glp:false },
];

const TOTAL = ITEMS.length;
const SK_M = 'ddglp3_meals', SK_C = 'ddglp3_checked';

function buildDefault() {
  return {
    0: ['ei1','ei2','topf','ferm','beer','vk1','lein','kurk0','gew0','was1','was2'],
    1: ['blatt1','kreuz','gem1','huel1','huel2','obst1','vk2','oel','kurk1','gew1','was3','was4'],
    2: ['blatt2','gem2','huel3','huel4','nuesse','kurk2','gew2','was5','was6','bew'],
  };
}

let meals, checked;
try { meals = JSON.parse(localStorage.getItem(SK_M)); } catch(e){}
if (!meals) meals = buildDefault();
// ensure all items placed
{ const all = new Set([...meals[0],...meals[1],...meals[2]]); ITEMS.forEach(it=>{ if(!all.has(it.id)) meals[0].push(it.id); }); }
try { checked = JSON.parse(localStorage.getItem(SK_C)); } catch(e){}
if (!checked) checked = {};

function save() {
  localStorage.setItem(SK_M, JSON.stringify(meals));
  localStorage.setItem(SK_C, JSON.stringify(checked));
}

function mealOf(id) {
  for (let m=0;m<3;m++) if ((meals[m]||[]).includes(id)) return m;
  return 0;
}

function moveItem(id, dir) {
  const from = mealOf(id);
  const to   = from + dir;
  if (to < 0 || to > 2) return;
  meals[from] = meals[from].filter(x => x !== id);
  meals[to].push(id);
  save();
  renderAll();
}

function toggleCheck(id) {
  checked[id] = !checked[id];
  save();
  renderAll();
}

function renderAll() {
  [0,1,2].forEach(m => {
    const wrap = document.getElementById('meal-' + m);
    wrap.innerHTML = '';

    const hdr = document.createElement('div');
    hdr.className = 'meal-header ' + MEALS[m].cls;
    const ids = meals[m] || [];
    const doneCount = ids.filter(id => checked[id]).length;
    hdr.innerHTML = `<span>${MEALS[m].label}</span><span class="meal-count">${doneCount}/${ids.length}</span>`;
    wrap.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'meal-body';

    if (ids.length === 0) {
      body.innerHTML = '<div class="empty-hint">Noch leer</div>';
    } else {
      ids.forEach(id => {
        const item = ITEMS.find(x => x.id === id); if (!item) return;
        const div = document.createElement('div');
        div.className = 'item' + (item.glp?' glp':'') + (checked[id]?' done':'');

        const chk = document.createElement('div');
        chk.className = 'check';
        chk.textContent = checked[id] ? '✓' : '';
        chk.onclick = () => toggleCheck(id);
        div.appendChild(chk);

        const em = document.createElement('div');
        em.className = 'iemoji'; em.textContent = item.emoji;
        div.appendChild(em);

        const tx = document.createElement('div');
        tx.className = 'itext';
        tx.innerHTML = `<div class="iname">${item.name}</div><div class="inote">${item.note}</div>`;
        div.appendChild(tx);

        const btns = document.createElement('div');
        btns.className = 'move-btns';

        const up = document.createElement('button');
        up.className = 'mbtn'; up.textContent = '▲'; up.title = 'Eine Mahlzeit früher';
        up.disabled = (m === 0);
        up.onclick = () => moveItem(id, -1);
        btns.appendChild(up);

        const dn = document.createElement('button');
        dn.className = 'mbtn'; dn.textContent = '▼'; dn.title = 'Eine Mahlzeit später';
        dn.disabled = (m === 2);
        dn.onclick = () => moveItem(id, 1);
        btns.appendChild(dn);

        div.appendChild(btns);
        body.appendChild(div);
      });
    }

    wrap.appendChild(body);
  });

  updateProgress();
}

function updateProgress() {
  const done = Object.values(checked).filter(Boolean).length;
  document.getElementById('bar').style.width = Math.round(done/TOTAL*100) + '%';
  document.getElementById('count').textContent = done + ' von ' + TOTAL + ' erledigt';
  document.getElementById('doneMsg').classList.toggle('visible', done === TOTAL);
}

function resetAll() {
  if (!confirm('Alles zurücksetzen?')) return;
  checked = {}; meals = buildDefault();
  save(); renderAll();
}

renderAll();
</script>
</body>
</html>
