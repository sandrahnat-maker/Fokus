<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bikini-Checkliste · 1. Juni</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Raleway:wght@300;400;600;700&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #A8173A;
    --gold: #C9922A;
    --navy: #1A2744;
    --violet: #5C3472;
    --sage: #3A6B4A;
    --cream: #FAF6EF;
    --warm: #F5EDD8;
    --sand: #E8D9B8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--cream);
    font-family: 'Raleway', sans-serif;
    color: var(--navy);
    min-height: 100vh;
    padding-bottom: 2rem;
  }

  /* WIMPELKETTE */
  .wimpel-banner {
    background: var(--navy);
    padding: 0.5rem 0 0;
    overflow: hidden;
    position: relative;
  }
  .wimpel-row {
    display: flex;
    gap: 0;
    animation: slideWimpel 18s linear infinite;
    white-space: nowrap;
  }
  @keyframes slideWimpel {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }
  .wimpel {
    display: inline-block;
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 28px solid var(--crimson);
    margin: 0 2px;
    flex-shrink: 0;
  }
  .wimpel:nth-child(2n) { border-top-color: var(--gold); }
  .wimpel:nth-child(3n) { border-top-color: var(--violet); }
  .wimpel:nth-child(4n) { border-top-color: var(--sage); }

  /* HEADER */
  .header {
    background: var(--navy);
    color: white;
    text-align: center;
    padding: 1.6rem 1.5rem 1.8rem;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px;
    width: 160px; height: 160px;
    border-radius: 50%;
    background: rgba(169,23,58,0.18);
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -30px; right: -20px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(201,146,42,0.15);
  }
  .header-emoji { font-size: 2.4rem; margin-bottom: 0.4rem; }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.7rem;
    letter-spacing: 0.02em;
    line-height: 1.2;
    position: relative; z-index: 1;
  }
  .header-sub {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    color: var(--sand);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    position: relative; z-index: 1;
  }
  .countdown-box {
    margin-top: 1rem;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(201,146,42,0.4);
    border-radius: 12px;
    padding: 0.6rem 1.2rem;
    display: inline-block;
    position: relative; z-index: 1;
  }
  .countdown-box span {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem;
    color: var(--gold);
    font-weight: 700;
  }
  .countdown-box p {
    font-size: 0.7rem;
    color: #ccc;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* PROGRESS */
  .progress-section {
    background: white;
    margin: 1rem;
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    box-shadow: 0 2px 12px rgba(26,39,68,0.08);
    border-left: 4px solid var(--gold);
  }
  .progress-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--navy);
    margin-bottom: 0.8rem;
  }
  .progress-bar-wrap {
    background: var(--warm);
    border-radius: 20px;
    height: 14px;
    overflow: hidden;
    margin-bottom: 0.4rem;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg, var(--sage), var(--gold));
    transition: width 0.6s ease;
  }
  .progress-stats {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: #888;
  }
  .progress-pct {
    font-weight: 700;
    color: var(--sage);
    font-size: 0.85rem;
  }

  /* TAGES-TABS */
  .tabs-wrap {
    padding: 0 1rem 0.5rem;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tabs-wrap::-webkit-scrollbar { display: none; }
  .tabs {
    display: flex;
    gap: 0.4rem;
    min-width: max-content;
  }
  .tab-btn {
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    font-family: 'Raleway', sans-serif;
    cursor: pointer;
    border: 2px solid var(--sand);
    background: white;
    color: #999;
    transition: all 0.2s;
    letter-spacing: 0.04em;
  }
  .tab-btn.active {
    background: var(--navy);
    color: white;
    border-color: var(--navy);
  }
  .tab-btn.done {
    background: var(--sage);
    color: white;
    border-color: var(--sage);
  }

  /* KATEGORIEN */
  .section {
    margin: 0 1rem 0.8rem;
    background: white;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 10px rgba(26,39,68,0.06);
  }
  .section-header {
    padding: 0.8rem 1.2rem;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    cursor: pointer;
    user-select: none;
  }
  .section-header .cat-icon { font-size: 1.1rem; }
  .section-header .cat-title {
    font-family: 'Playfair Display', serif;
    font-size: 0.95rem;
    flex: 1;
  }
  .section-header .cat-count {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 0.2rem 0.6rem;
    border-radius: 10px;
    letter-spacing: 0.04em;
  }
  .cat-ernährung .section-header { background: #FEF6E8; }
  .cat-ernährung .cat-count { background: #FDEBD0; color: var(--gold); }
  .cat-bewegung .section-header { background: #E8F5EE; }
  .cat-bewegung .cat-count { background: #D5F5E3; color: var(--sage); }
  .cat-pflege .section-header { background: #F3EAF8; }
  .cat-pflege .cat-count { background: #E8DAEF; color: var(--violet); }
  .cat-wasser .section-header { background: #EAF4FB; }
  .cat-wasser .cat-count { background: #D6EAF8; color: #2471A3; }

  .task-list { padding: 0.4rem 0; }
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 0.8rem;
    padding: 0.65rem 1.2rem;
    border-top: 1px solid #F4F0E8;
    cursor: pointer;
    transition: background 0.15s;
  }
  .task-item:hover { background: #FAFAF7; }
  .task-item.checked { opacity: 0.55; }

  .check-circle {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--sand);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-size: 0.75rem;
  }
  .task-item.checked .check-circle {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
  }

  .task-text { flex: 1; }
  .task-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--navy);
    line-height: 1.3;
  }
  .task-item.checked .task-name {
    text-decoration: line-through;
    color: #aaa;
  }
  .task-note {
    font-size: 0.74rem;
    color: #999;
    margin-top: 0.15rem;
    font-style: italic;
  }

  /* MOTIVATION */
  .motivation-card {
    margin: 0.8rem 1rem;
    background: linear-gradient(135deg, var(--navy) 0%, var(--violet) 100%);
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    color: white;
    text-align: center;
  }
  .motivation-card .quote {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 1rem;
    line-height: 1.5;
    color: var(--sand);
    margin-bottom: 0.5rem;
  }
  .motivation-card .author {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  /* WOCHEN-ÜBERSICHT */
  .week-grid {
    margin: 0.8rem 1rem;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.3rem;
  }
  .week-day {
    background: white;
    border-radius: 10px;
    padding: 0.5rem 0.2rem;
    text-align: center;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .week-day.today {
    border-color: var(--crimson);
  }
  .week-day.complete {
    background: var(--sage);
    color: white;
  }
  .week-day .day-label {
    font-size: 0.62rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: #aaa;
  }
  .week-day.complete .day-label { color: rgba(255,255,255,0.7); }
  .week-day .day-num {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    color: var(--navy);
    margin-top: 0.1rem;
  }
  .week-day.complete .day-num { color: white; }
  .week-day .day-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--crimson);
    margin: 0.2rem auto 0;
    opacity: 0;
  }
  .week-day.today .day-dot { opacity: 1; }

  /* FOOTER NAV */
  .footer-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: white;
    border-top: 1px solid var(--sand);
    padding: 0.6rem 1rem;
    display: flex;
    justify-content: space-around;
  }
  .footer-nav a {
    text-decoration: none;
    color: #aaa;
    font-size: 0.65rem;
    font-weight: 600;
    text-align: center;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .footer-nav a .fn-icon { font-size: 1.2rem; display: block; margin-bottom: 0.1rem; }

  .spacer { height: 4rem; }
</style>
</head>
<body>

<div class="wimpel-banner">
  <div class="wimpel-row" id="wimpelRow"></div>
</div>

<div class="header">
  <div class="header-emoji">👙</div>
  <h1>Bikini-Checkliste</h1>
  <div class="header-sub">15. Mai – 1. Juni 2026</div>
  <div class="countdown-box">
    <span id="countdownDays">–</span>
    <p>Tage bis zum 1. Juni</p>
  </div>
</div>

<!-- Wochenübersicht -->
<div class="week-grid" id="weekGrid"></div>

<!-- Fortschritt heute -->
<div class="progress-section">
  <div class="progress-title">✨ Heute geschafft</div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
  </div>
  <div class="progress-stats">
    <span id="progressText">0 von 0 Aufgaben</span>
    <span class="progress-pct" id="progressPct">0 %</span>
  </div>
</div>

<!-- Tages-Tabs -->
<div class="tabs-wrap">
  <div class="tabs" id="tabsRow"></div>
</div>

<!-- Aufgaben -->
<div id="tasksContainer"></div>

<!-- Motivation -->
<div class="motivation-card">
  <div class="quote" id="motivQuote">"Fröhlichkeit ist mein Kern."</div>
  <div class="author">Sandra Hnat-Gerersdorfer, BEd</div>
</div>

<div class="spacer"></div>

<div class="footer-nav">
  <a href="index.html"><span class="fn-icon">🏠</span>Home</a>
  <a href="Wochenplan.html"><span class="fn-icon">🥗</span>Ernährung</a>
  <a href="Wiegen.html"><span class="fn-icon">⚖️</span>Wiegen</a>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const CATEGORIES = [
  {
    id: 'ernährung',
    icon: '🍽️',
    title: 'Ernährung',
    cls: 'cat-ernährung',
    tasks: [
      { id: 'e1', name: 'Frühstück ≤ 350 kcal', note: 'Porridge oder Ei + Gemüse' },
      { id: 'e2', name: 'Hülsenfrüchte zum Mittagessen', note: 'Linsen, Kichererbsen, Bohnen' },
      { id: 'e3', name: 'Abendessen leicht & proteinreich', note: 'Wenig Brot/Nudeln/Reis abends' },
      { id: 'e4', name: 'Kein Snacken nach dem Abendessen', note: 'Tee statt Naschen 🍵' },
      { id: 'e5', name: 'Wenig Salz heute', note: 'Kräuter statt Salz würzen' },
    ]
  },
  {
    id: 'bewegung',
    icon: '🐾',
    title: 'Bewegung',
    cls: 'cat-bewegung',
    tasks: [
      { id: 'b1', name: 'Lotte-Spaziergang ≥ 30 Min.', note: 'Zügiges Tempo wenn möglich' },
      { id: 'b2', name: '10 Min. Körperspannung', note: 'Plank, Beckenboden, Bauch' },
      { id: 'b3', name: 'Yoga / Balanceboard / Muskeltraining', note: 'Was heute dransteht' },
    ]
  },
  {
    id: 'wasser',
    icon: '💧',
    title: 'Hydration',
    cls: 'cat-wasser',
    tasks: [
      { id: 'w1', name: 'Morgens 500 ml Wasser', note: 'Nach Euthyrox, vor dem Frühstück' },
      { id: 'w2', name: '2 Liter Wasser gesamt', note: 'Tees zählen mit!' },
      { id: 'w3', name: 'Tee am Nachmittag', note: 'Statt Snack — bewusste Pause' },
    ]
  },
  {
    id: 'pflege',
    icon: '🌸',
    title: 'Wohlbefinden',
    cls: 'cat-pflege',
    tasks: [
      { id: 'p1', name: 'Mindful Moment heute', note: 'Meditation oder bewusstes Innehalten' },
      { id: 'p2', name: 'Magnesium abends', note: 'Glycinat/Malat vor dem Schlafen' },
      { id: 'p3', name: '1 schöner Moment notiert', note: 'Was hat mich heute zum Lächeln gebracht?' },
    ]
  }
];

const QUOTES = [
  "Fröhlichkeit ist mein Kern.",
  "Liebe · Phantasie · Lebendigkeit",
  "Liebe · Wunder · Lächeln",
  "Ich darf bei mir so sein, wie ich bin.",
  "Sanft und beständig — das ist mein Weg.",
  "Jeder Tag ist ein neuer Anfang.",
  "Mein Körper trägt mich — ich schätze ihn.",
];

// ── STATE ─────────────────────────────────────────────────────────────────
const START_DATE = new Date('2026-05-15');
const END_DATE   = new Date('2026-06-01');
const TOTAL_DAYS = Math.round((END_DATE - START_DATE) / 86400000) + 1; // 19 days

function todayKey() {
  return new Date().toISOString().slice(0,10);
}

function loadState() {
  try { return JSON.parse(localStorage.getItem('bikini_state') || '{}'); } catch { return {}; }
}
function saveState(s) {
  try { localStorage.setItem('bikini_state', JSON.stringify(s)); } catch {}
}

let state = loadState();
let currentDay = todayKey();

// ── WIMPEL ────────────────────────────────────────────────────────────────
function buildWimpel() {
  const row = document.getElementById('wimpelRow');
  const html = Array.from({length: 60}, () => '<span class="wimpel"></span>').join('');
  row.innerHTML = html + html; // duplicate for seamless loop
}

// ── COUNTDOWN ─────────────────────────────────────────────────────────────
function updateCountdown() {
  const now = new Date();
  const diff = Math.ceil((END_DATE - now) / 86400000);
  document.getElementById('countdownDays').textContent = Math.max(0, diff);
}

// ── WEEK GRID ─────────────────────────────────────────────────────────────
function buildWeekGrid() {
  const grid = document.getElementById('weekGrid');
  const today = todayKey();
  let html = '';
  const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
  
  for (let i = 0; i < TOTAL_DAYS; i++) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const dayTasks = state[key] || [];
    const allTasks = CATEGORIES.flatMap(c => c.tasks);
    const complete = allTasks.length > 0 && dayTasks.length === allTasks.length;
    const isToday = key === today;
    const isPast = key < today;
    
    html += `<div class="week-day ${isToday ? 'today' : ''} ${complete ? 'complete' : ''}" onclick="switchDay('${key}')">
      <div class="day-label">${days[d.getDay()]}</div>
      <div class="day-num">${d.getDate()}</div>
      <div class="day-dot"></div>
    </div>`;
  }
  grid.innerHTML = html;
}

// ── TABS ──────────────────────────────────────────────────────────────────
function buildTabs() {
  const row = document.getElementById('tabsRow');
  const today = todayKey();
  const allTasks = CATEGORIES.flatMap(c => c.tasks);
  let html = '';

  for (let i = 0; i < TOTAL_DAYS; i++) {
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + i);
    const key = d.toISOString().slice(0,10);
    const dayTasks = state[key] || [];
    const complete = dayTasks.length === allTasks.length;
    const isActive = key === currentDay;
    
    const label = d.getDate() + '.' + (d.getMonth()+1) + '.';
    html += `<button class="tab-btn ${isActive ? 'active' : ''} ${complete && !isActive ? 'done' : ''}" onclick="switchDay('${key}')">${label}</button>`;
  }
  row.innerHTML = html;
}

// ── TASKS ─────────────────────────────────────────────────────────────────
function buildTasks() {
  const container = document.getElementById('tasksContainer');
  const checked = state[currentDay] || [];
  let html = '';

  for (const cat of CATEGORIES) {
    const catChecked = cat.tasks.filter(t => checked.includes(t.id)).length;
    html += `<div class="section ${cat.cls}">
      <div class="section-header">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-title">${cat.title}</span>
        <span class="cat-count">${catChecked}/${cat.tasks.length}</span>
      </div>
      <div class="task-list">`;
    
    for (const task of cat.tasks) {
      const done = checked.includes(task.id);
      html += `<div class="task-item ${done ? 'checked' : ''}" onclick="toggleTask('${task.id}')">
        <div class="check-circle">${done ? '✓' : ''}</div>
        <div class="task-text">
          <div class="task-name">${task.name}</div>
          ${task.note ? `<div class="task-note">${task.note}</div>` : ''}
        </div>
      </div>`;
    }
    html += `</div></div>`;
  }
  container.innerHTML = html;
  updateProgress();
}

function toggleTask(taskId) {
  const checked = new Set(state[currentDay] || []);
  if (checked.has(taskId)) { checked.delete(taskId); }
  else { checked.add(taskId); }
  state[currentDay] = [...checked];
  saveState(state);
  buildTasks();
  buildTabs();
  buildWeekGrid();
}

function updateProgress() {
  const allTasks = CATEGORIES.flatMap(c => c.tasks);
  const checked = state[currentDay] || [];
  const pct = allTasks.length ? Math.round(checked.length / allTasks.length * 100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${checked.length} von ${allTasks.length} Aufgaben`;
  document.getElementById('progressPct').textContent = pct + ' %';
}

function switchDay(key) {
  currentDay = key;
  buildTabs();
  buildTasks();
}

// ── QUOTE ─────────────────────────────────────────────────────────────────
function setQuote() {
  const q = QUOTES[Math.floor(Math.random() * QUOTES.length)];
  document.getElementById('motivQuote').textContent = `„${q}"`;
}

// ── INIT ──────────────────────────────────────────────────────────────────
buildWimpel();
updateCountdown();
buildWeekGrid();
buildTabs();
buildTasks();
setQuote();
setInterval(updateCountdown, 60000);
</script>
</body>
</html>
