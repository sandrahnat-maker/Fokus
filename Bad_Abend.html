<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Bad Abend</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--gelb:#FFD93D;--rot:#E84855;--blau:#3D87CB;--grün:#4CAF72;--orange:#FF6B35;--lila:#9B5DE5;--creme:#FFF8E7;--dunkel:#1a0a00;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--creme);font-family:'Nunito',sans-serif;color:var(--dunkel);min-height:100vh;padding-bottom:5rem;
  background-image:repeating-linear-gradient(-12deg,transparent 0,transparent 60px,rgba(155,93,229,.05) 60px,rgba(155,93,229,.05) 80px,transparent 80px,transparent 140px);}
.vk-header{background:var(--lila);border-bottom:3px solid var(--dunkel);padding:.8rem 1.1rem .7rem;}
.vk-header::before{content:'';display:block;height:6px;margin-bottom:.5rem;background:repeating-linear-gradient(90deg,var(--rot) 0,var(--rot) 20%,var(--gelb) 20%,var(--gelb) 40%,var(--grün) 40%,var(--grün) 60%,var(--blau) 60%,var(--blau) 80%,var(--lila) 80%,var(--lila) 100%);border-radius:3px;}
.vk-back{display:inline-flex;align-items:center;gap:.3rem;font-family:'Caveat',cursive;font-size:1rem;color:white;text-decoration:none;background:none;border:none;cursor:pointer;opacity:.8;margin-bottom:.3rem;padding:0;}
.vk-eyebrow{font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;opacity:.7;font-weight:700;margin-bottom:.15rem;color:white;}
.vk-title{font-family:'Fredoka One',cursive;font-size:1.8rem;line-height:1.1;color:white;}
.vk-sub{font-family:'Caveat',cursive;font-size:1rem;opacity:.75;margin-top:.1rem;color:white;}
.vk-progress{margin:1rem 1rem 0;padding:.8rem 1rem;background:white;border:3px solid var(--dunkel);border-radius:14px;box-shadow:3px 3px 0 var(--dunkel);}
.vk-prog-row{display:flex;justify-content:space-between;font-family:'Fredoka One',cursive;font-size:.95rem;margin-bottom:.4rem;}
.vk-prog-bar{height:12px;background:rgba(26,10,0,.1);border-radius:20px;overflow:hidden;border:2px solid var(--dunkel);}
.vk-prog-fill{height:100%;background:linear-gradient(90deg,var(--lila),var(--blau));border-radius:20px;transition:width .4s;}
.vk-fertig{display:none;background:var(--lila);border:3px solid var(--dunkel);border-radius:14px;margin:1rem 1rem 0;padding:.7rem 1rem;text-align:center;box-shadow:4px 4px 0 var(--dunkel);}
.vk-fertig.sichtbar{display:block;}
.vk-fertig-text{font-family:'Fredoka One',cursive;font-size:1.1rem;color:white;}
.vk-section{font-family:'Fredoka One',cursive;font-size:.85rem;letter-spacing:.1em;text-transform:uppercase;color:var(--lila);padding:.6rem 1rem .2rem;opacity:.9;}
.vk-card{background:white;border:3px solid var(--dunkel);border-radius:16px;box-shadow:4px 4px 0 var(--dunkel);margin:.3rem 1rem 0;overflow:hidden;}
.vk-item{display:flex;align-items:flex-start;gap:.65rem;padding:.6rem 1rem;border-bottom:2px dashed rgba(26,10,0,.1);cursor:pointer;transition:background .15s;}
.vk-item:last-child{border-bottom:none;}
.vk-item:active{background:rgba(155,93,229,.12);}
.vk-item.erledigt{opacity:.3;}
.vk-item.erledigt .vk-name{text-decoration:line-through;}
.vk-kreis{width:24px;height:24px;border:3px solid var(--dunkel);border-radius:50%;flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:.8rem;background:white;transition:all .2s;}
.vk-item.erledigt .vk-kreis{background:var(--lila);border-color:var(--lila);color:white;}
.vk-inhalt{flex:1;}
.vk-name{font-size:1rem;font-weight:700;line-height:1.3;}
.vk-desc{font-family:'Caveat',cursive;font-size:1rem;color:rgba(26,10,0,.55);margin-top:.05rem;}
.vk-reset{position:fixed;bottom:1.2rem;right:1.2rem;background:white;border:3px solid var(--dunkel);border-radius:20px;padding:.4rem 1rem;font-family:'Fredoka One',cursive;font-size:.9rem;cursor:pointer;box-shadow:3px 3px 0 var(--dunkel);}
.vk-reset:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--dunkel);}
</style>
</head>
<body>
<div class="vk-header">
  <button class="vk-back" onclick="history.back()">← zurück</button>
  <div class="vk-eyebrow">Abendritual</div>
  <div class="vk-title">🛁 Bad Abend</div>
  <div class="vk-sub">Loslassen · abschließen · bereit für's Bett</div>
</div>

<div class="vk-progress">
  <div class="vk-prog-row">
    <span id="plbl">0 von 0</span>
    <span id="ppct">0%</span>
  </div>
  <div class="vk-prog-bar"><div class="vk-prog-fill" id="pb" style="width:0%"></div></div>
</div>

<div class="vk-fertig" id="doneBanner">
  <div class="vk-fertig-text">🌙 Gute Nacht, Sandra! ✦</div>
</div>

<div id="list"></div>
<button class="vk-reset" onclick="rst()">↺ Neu</button>

<script>
var D=[
  {sec:"🌸 Gesicht"},
  {n:"Abschminken / Reinigen",s:"Lavera Reinigungsmilch – sanft kreisen"},
  {n:"Toner",s:"Lavera Basis Sensitiv Beruhigendes Gesichtswasser – mit Wattepad sanft auftragen"},
  {n:"Gesichtsserum",s:"Lavera Straffendes Serum Hyaluron + Bakuchiol – eintippen"},
  {n:"Nachtcreme",s:"Lavera Straffende Nachtpflege – Hals miteinbeziehen"},
  {n:"Augencreme",s:"Sanft ums Auge tupfen – nie reiben"},
  {sec:"🦷 Zähne & Mund"},
  {n:"Zähne putzen",s:"2 Min – elektrische Zahnbürste"},
  {n:"Mundspülung",s:"30 Sek spülen"},
  {n:"Knirscherschiene einsetzen"},
  {sec:"🦱 Haare"},
  {n:"Haare bürsten",s:"Naturborstenbürste · 30–50 Striche · verteilt die natürlichen Haaröle"},
  {n:"Haaröl in die Spitzen",s:"Lavera Haaröl · 1–2 Tropfen · nur in die Spitzen · wirkt über Nacht"},
  {n:"Fußcreme",s:"Lavera Fußcreme mit Bio-Sanddorn – Fersen & Ballen"},
  {n:"Nagelöl & Handcreme",s:"Jojoba-Öl Nagelhaut + Lavera Basis Sensitiv Handcreme"},
];

var S={};
function saveS(){try{localStorage.setItem('bad_abend_v1',JSON.stringify(S));}catch(e){}}
function loadS(){try{S=JSON.parse(localStorage.getItem('bad_abend_v1')||'{}');}catch(e){S={};}}
function tog(i){if(D[i]&&D[i].sec)return;S[i]=!S[i];saveS();rnd();}
function rst(){S={};saveS();rnd();}

function rnd(){
  var total=0,done=0;
  var sections=[];var cur={sec:'',items:[]};
  for(var i=0;i<D.length;i++){
    var it=D[i];
    if(it.sec){
      if(cur.items.length)sections.push(cur);
      cur={sec:it.sec,items:[]};
    } else {
      cur.items.push({item:it,idx:i});
      total++;
      if(S[i])done++;
    }
  }
  if(cur.items.length)sections.push(cur);

  var pct=total?Math.round(done/total*100):0;
  document.getElementById('plbl').textContent=done+' von '+total;
  document.getElementById('ppct').textContent=pct+'%';
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('doneBanner').className='vk-fertig'+(done===total&&total>0?' sichtbar':'');

  var html='';
  for(var s=0;s<sections.length;s++){
    var sec=sections[s];
    html+='<div class="vk-section">'+sec.sec+'</div><div class="vk-card">';
    for(var j=0;j<sec.items.length;j++){
      var entry=sec.items[j];
      var it=entry.item,idx=entry.idx,d=!!S[idx];
      html+='<div class="vk-item'+(d?' erledigt':'')+'" onclick="tog('+idx+')">'
        +'<div class="vk-kreis">'+(d?'✓':'')+'</div>'
        +'<div class="vk-inhalt"><div class="vk-name">'+it.n+'</div>'
        +(it.s?'<div class="vk-desc">'+it.s+'</div>':'')
        +'</div></div>';
    }
    html+='</div>';
  }
  document.getElementById('list').innerHTML=html;
}
loadS();rnd();
</script>
</body>
</html>
