<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bad Abend</title><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"><style>
:root{--bg:#faf3e8;--white:#fffdf8;--text:#2e2010;--muted:rgba(20,10,0,0.55);--gold:#c8943a;--sage:#7a9a5a;--border:rgba(180,130,70,0.15);}
html{font-size:18px;}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Cormorant Garamond",Georgia,serif;background:var(--bg);color:var(--text);padding:.85rem;padding-bottom:3rem}
h1{font-family:"Playfair Display",serif;font-size:22px;font-style:italic;font-weight:400;color:var(--text);margin-bottom:.8rem;padding-bottom:.4rem;border-bottom:1px solid var(--border)}
.item{display:flex;align-items:flex-start;gap:.7rem;padding:.65rem .85rem;background:var(--white);border-radius:12px;margin-bottom:.4rem;border:1px solid var(--border);cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 1px 6px rgba(180,120,40,0.04)}
.item.done{opacity:.4}.item.done .nm{text-decoration:line-through}
.cb{width:22px;height:22px;border-radius:50%;border:1.5px solid rgba(180,130,70,0.3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:.05rem;color:#fff;transition:all .15s}
.item.done .cb{background:var(--sage);border-color:var(--sage)}
.nm{font-size:16px;font-weight:600;line-height:1.3}
.sb{font-size:13px;color:var(--muted);margin-top:.1rem;line-height:1.4;font-style:italic}
.sec{font-size:11px;font-weight:400;text-transform:uppercase;letter-spacing:.12em;color:var(--gold);margin:.9rem 0 .4rem .2rem}
.info{font-size:13px;color:var(--muted);background:rgba(200,148,58,0.06);border-radius:10px;padding:.45rem .7rem;margin-bottom:.5rem;line-height:1.6;font-style:italic}
.reset{position:fixed;bottom:1rem;right:1rem;background:var(--gold);color:#fff;border:none;border-radius:20px;padding:.4rem 1.1rem;font-size:14px;cursor:pointer;font-family:"Cormorant Garamond",serif}
</style></head><body>
<h1>🌙 Bad Abend</h1>
<div id="L"></div>
<button class="reset" onclick="rst()">↺ Zurücksetzen</button>
<script>
var D=[{"sec": "Gesicht"}, {"n": "Abschminken / Reinigen", "s": "Lavera Reinigungsmilch \u2013 sanft kreisen"}, {"n": "Toner", "s": "Lavera Basis Sensitiv Beruhigendes Gesichtswasser \u2013 Mit Wattepad sanft auftragen"}, {"n": "Gesichtsserum", "s": "Lavera Straffendes Serum Hyaluron + Bakuchiol \u2013 eintippen"}, {"n": "Nachtcreme", "s": "Lavera Straffende Nachtpflege \u2013 Hals miteinbeziehen"}, {"n": "Augencreme", "s": "Sanft ums Auge tupfen \u2013 nie reiben"}, {"sec": "Z\u00E4hne & Mund"}, {"n": "Z\u00E4hne putzen", "s": "2 Min \u2013 elektrische Zahnb\u00FCrste"}, {"n": "Mundsp\u00FClung", "s": "30 Sek sp\u00FClen"}, {"n": "Knirscherschiene einsetzen"}, {"sec": "Haare"}, {"n": "Haare bürsten", "s": "Naturborstenbürste · 30–50 Striche · vom Ansatz bis in die Spitzen · verteilt die natürlichen Haaröle und macht die Haare glänzend"}, {"n": "Haaröl in die Spitzen", "s": "Lavera Haaröl · 1–2 Tropfen in die Handfläche · nur in die Spitzen einarbeiten · wirkt über Nacht · noch kaufen! 🛒"}, {"n": "Fu\u00DFcreme", "s": "Lavera Fu\u00DFcreme mit Bio-Sanddorn \u2013 Fersen & Ballen"}, {"n": "Nagel\u00F6l & Handcreme", "s": "Jojoba-\u00D6l Nagelhaut + Lavera Basis Sensitiv Handcreme"}];
var S={};
function tog(i){if(D[i]&&D[i].sec)return;S[i]=!S[i];rnd()}
function rst(){S={};rnd()}
function rnd(){
  var html='';
  for(var i=0;i<D.length;i++){
    var it=D[i];
    if(it.sec){html+='<div class="sec">'+it.sec+'</div>';continue;}
    if(it.info){html+='<div class="info">'+it.info+'</div>';continue;}
    var d=!!S[i];
    html+='<div class="item'+(d?' done':'')+'" onclick="tog('+i+')">';
    html+='<div class="cb">'+(d?'&#10003;':'')+'</div>';
    html+='<div><div class="nm">'+it.n+'</div>';
    if(it.s)html+='<div class="sb">'+it.s+'</div>';
    html+='</div></div>';
  }
  document.getElementById('L').innerHTML=html;
}
rnd();
</script></body></html>
