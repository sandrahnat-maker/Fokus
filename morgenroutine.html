<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Morgenroutine</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap');
  :root { --cream:#f7f3ed; --warm:#ede5d8; --sand:#c9b99a; --terra:#8b6f5e; --deep:#3a2d26; --sage:#7a8c6e; --gold:#c4a55a; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--cream); font-family:'Cormorant Garamond',serif; min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background:radial-gradient(ellipse at 15% 0%,rgba(196,165,90,.07) 0%,transparent 55%),radial-gradient(ellipse at 85% 100%,rgba(122,140,110,.07) 0%,transparent 55%); pointer-events:none; z-index:0; }
  .app { max-width:420px; margin:0 auto; padding-bottom:60px; position:relative; z-index:1; }
  .header { padding:28px 22px 18px; border-bottom:1px solid rgba(201,185,154,.5); position:sticky; top:0; background:var(--cream); z-index:10; }
  .date-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.18em; color:var(--sand); text-transform:uppercase; margin-bottom:3px; }
  .title { font-size:26px; font-weight:300; color:var(--deep); }
  .title em { font-style:italic; color:var(--terra); }
  .progress-row { display:flex; align-items:center; gap:10px; margin-top:12px; }
  .progress-bar { flex:1; height:2px; background:var(--warm); border-radius:1px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--sage)); border-radius:1px; transition:width .5s ease; width:0%; }
  .progress-text { font-family:'DM Mono',monospace; font-size:9px; color:var(--sand); white-space:nowrap; }
  .phase { padding:18px 22px 4px; display:flex; align-items:center; gap:10px; }
  .phase-label { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; color:var(--sand); white-space:nowrap; }
  .phase-line { flex:1; height:1px; background:rgba(201,185,154,.35); }
  .phase-icon { font-size:13px; }
  .step { display:flex; align-items:flex-start; gap:12px; padding:13px 22px; cursor:pointer; transition:background .15s; -webkit-tap-highlight-color:transparent; border-bottom:1px solid rgba(201,185,154,.18); }
  .step:active { background:rgba(201,185,154,.12); }
  .step.done { opacity:.42; }
  .step.done .step-name { text-decoration:line-through; text-decoration-color:var(--sand); }
  .step-check { width:20px; height:20px; border:1.5px solid var(--sand); border-radius:50%; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all .25s; }
  .step.done .step-check { background:var(--sage); border-color:var(--sage); }
  .step.done .step-check::after { content:'✓'; color:white; font-size:11px; font-family:'DM Mono',monospace; }
  .step-emoji { font-size:16px; flex-shrink:0; margin-top:2px; }
  .step-content { flex:1; }
  .step-name { font-size:16px; font-weight:400; color:var(--deep); line-height:1.3; }
  .step-note { font-size:12px; font-style:italic; color:var(--terra); margin-top:2px; line-height:1.4; opacity:.85; }
  .med-badge { font-family:'DM Mono',monospace; font-size:8px; letter-spacing:.08em; background:rgba(196,165,90,.13); color:var(--gold); border:1px solid rgba(196,165,90,.3); border-radius:2px; padding:1px 5px; margin-top:3px; display:inline-block; }
  .flow-dot { text-align:center; padding:1px 0; color:rgba(201,185,154,.4); font-size:9px; letter-spacing:4px; pointer-events:none; }
  .fokus-wrap { margin:20px 14px 8px; border:1px solid rgba(201,185,154,.5); border-radius:3px; overflow:hidden; }
  .fokus-head { background:var(--deep); color:var(--cream); padding:10px 14px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.16em; text-transform:uppercase; display:flex; align-items:center; gap:8px; }
  .fokus-dot { width:5px; height:5px; border-radius:50%; background:var(--gold); animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
  .fokus-body { padding:14px; background:white; }
  .fokus-row { display:flex; gap:8px; margin-bottom:10px; }
  .fokus-input { flex:1; font-family:'Cormorant Garamond',serif; font-size:15px; border:none; border-bottom:1px solid var(--sand); padding:5px 0; background:transparent; color:var(--deep); outline:none; }
  .fokus-input::placeholder { color:var(--sand); font-style:italic; }
  .fokus-btn { font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.1em; background:var(--deep); color:var(--cream); border:none; padding:7px 12px; cursor:pointer; border-radius:2px; align-self:flex-end; transition:background .2s; white-space:nowrap; }
  .fokus-btn:hover { background:var(--terra); }
  .fokus-btn:disabled { opacity:.35; cursor:not-allowed; }
  .fokus-result { font-size:14px; font-style:italic; color:var(--deep); line-height:1.65; padding:12px; background:var(--cream); border-radius:2px; display:none; }
  .fokus-result.visible { display:block; }
  @keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }
  .loading::after { content:'...'; animation:dots 1.2s steps(4,end) infinite; }
  .celebration { text-align:center; padding:28px 20px; display:none; }
  .celebration.visible { display:block; }
  .celebration-icon { font-size:44px; animation:bloom .6s ease-out; margin-bottom:10px; }
  @keyframes bloom { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }
  .celebration-text { font-size:22px; font-weight:300; font-style:italic; color:var(--deep); }
  .celebration-sub { font-family:'DM Mono',monospace; font-size:9px; color:var(--sand); letter-spacing:.12em; margin-top:6px; }
  .reset-btn { display:block; width:calc(100% - 28px); margin:4px 14px 0; padding:11px; font-family:'DM Mono',monospace; font-size:9px; letter-spacing:.13em; text-transform:uppercase; background:transparent; border:1px solid rgba(201,185,154,.5); color:var(--terra); cursor:pointer; border-radius:2px; transition:all .2s; }
  .reset-btn:hover { background:var(--warm); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="date-label" id="dateLabel"></div>
    <div class="title">Morgen<em>routine</em></div>
    <div class="progress-row">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText"></div>
    </div>
  </div>

  <div id="stepsList"></div>

  <div class="fokus-wrap">
    <div class="fokus-head"><div class="fokus-dot"></div>Fokus für heute</div>
    <div class="fokus-body">
      <div class="fokus-row">
        <input class="fokus-input" id="fokusInput" placeholder="Was liegt mir heute am Herzen?" maxlength="200">
        <button class="fokus-btn" id="fokusBtn" onclick="getFokus()">Impuls ✦</button>
      </div>
      <div class="fokus-result" id="fokusResult"></div>
    </div>
  </div>

  <div class="celebration" id="celebration">
    <div class="celebration-icon">🌿</div>
    <div class="celebration-text">Routine abgeschlossen</div>
    <div class="celebration-sub">Der Tag gehört dir.</div>
  </div>

  <button class="reset-btn" onclick="resetAll()">↺ Neu starten</button>
</div>

<script>
const PHASES = [
  {
    label:'Im Bett', icon:'🌙',
    steps:[
      { id:1, emoji:'💊', name:'Euthyrox',           note:'nüchtern, noch im Bett', med:true },
      { id:2, emoji:'🤸', name:'Rückenübungen',      note:'sanft, noch liegend' },
    ]
  },
  {
    label:'Aufstehen', icon:'🌅',
    steps:[
      { id:3, emoji:'🐱', name:'Rudi – Magenschutz', note:'erstes nach dem Aufstehen, vor dem Futter', med:true },
      { id:4, emoji:'🩺', name:'Blutdruck messen',   note:'ruhig sitzen, notieren' },
      { id:5, emoji:'⚖️', name:'Wiegen',             note:'nüchtern, vor dem Trinken' },
      { id:6, emoji:'🦷', name:'Knirscherschiene',   note:'rausnehmen & spülen' },
    ]
  },
  {
    label:'Frühstück', icon:'🍵',
    steps:[
      { id:7,  emoji:'💧', name:'Wasser trinken',    note:'warmes Wasser, ggf. mit Zitrone' },
      { id:8,  emoji:'🍵', name:'Tee kochen',        note:'nach Wochenplan' },
      { id:9,  emoji:'🥣', name:'Frühstück',         note:'bewusst & ungestört' },
      { id:10, emoji:'💊', name:'Medikamente',       note:'zum Frühstück – Liste prüfen', med:true },
    ]
  },
  {
    label:'Tierrunde', icon:'🐾',
    steps:[
      { id:11, emoji:'🐱', name:'Rudi & Timmy',      note:'Futter, kurze Schmusezeit' },
    ]
  },
  {
    label:'Bad', icon:'🪥',
    steps:[
      { id:12, emoji:'🪥', name:'Bad Früh',          note:'Gesicht, Zähne, Körperpflege' },
    ]
  },
  {
    label:'Lotte & Abschluss', icon:'🐕',
    steps:[
      { id:13, emoji:'🐕', name:'Lotte raus',        note:'erste Runde, ruhiges Tempo' },
      { id:14, emoji:'💊', name:'Medikamente Tiere', note:'Lotte + Rudi nach Plan', med:true },
      { id:15, emoji:'🎨', name:'Ins Atelier',       note:'alles bereit?' },
    ]
  },
];

const ALL_STEPS = PHASES.flatMap(p => p.steps);
let done = JSON.parse(localStorage.getItem('morgen_v5') || '[]');

function render() {
  const list = document.getElementById('stepsList');
  list.innerHTML = '';
  PHASES.forEach(phase => {
    const ph = document.createElement('div');
    ph.className = 'phase';
    ph.innerHTML = `<span class="phase-icon">${phase.icon}</span><span class="phase-label">${phase.label}</span><div class="phase-line"></div>`;
    list.appendChild(ph);
    phase.steps.forEach((s, idx) => {
      const div = document.createElement('div');
      div.className = 'step' + (done.includes(s.id) ? ' done' : '');
      div.innerHTML = `
        <div class="step-check"></div>
        <div class="step-emoji">${s.emoji}</div>
        <div class="step-content">
          <div class="step-name">${s.name}</div>
          <div class="step-note">${s.note}</div>
          ${s.med ? '<span class="med-badge">Medikament</span>' : ''}
        </div>`;
      div.onclick = () => toggle(s.id);
      list.appendChild(div);
      if (idx < phase.steps.length - 1) {
        const dot = document.createElement('div');
        dot.className = 'flow-dot';
        dot.textContent = '· · ·';
        list.appendChild(dot);
      }
    });
  });
  const n = done.length, total = ALL_STEPS.length;
  document.getElementById('progressFill').style.width = Math.round(n/total*100) + '%';
  document.getElementById('progressText').textContent = n + ' / ' + total;
  document.getElementById('celebration').classList.toggle('visible', n === total);
  const d = new Date();
  document.getElementById('dateLabel').textContent = d.toLocaleDateString('de-AT', { weekday:'long', day:'numeric', month:'long' });
}

function toggle(id) {
  done = done.includes(id) ? done.filter(x => x !== id) : [...done, id];
  localStorage.setItem('morgen_v5', JSON.stringify(done));
  render();
}

function resetAll() {
  done = [];
  localStorage.removeItem('morgen_v5');
  document.getElementById('fokusResult').classList.remove('visible');
  document.getElementById('fokusInput').value = '';
  render();
}

async function getFokus() {
  const input = document.getElementById('fokusInput').value.trim();
  const result = document.getElementById('fokusResult');
  const btn = document.getElementById('fokusBtn');
  if (!input) return;
  btn.disabled = true;
  result.className = 'fokus-result visible loading';
  result.textContent = 'Einen Moment';
  const n = done.length, total = ALL_STEPS.length;
  const pct = Math.round(n/total*100);
  const donenames = ALL_STEPS.filter(s => done.includes(s.id)).map(s=>s.name).join(', ') || 'noch nichts';
  const offen = ALL_STEPS.filter(s => !done.includes(s.id)).map(s=>s.name).join(', ') || 'alles erledigt';
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514', max_tokens:1000,
        system:`Du bist ein ruhiger, warmherziger Morgenbegleiter für Sandra – DaZ-Lehrerin in Wien, Yogini, Tierliebhaberin (Hund Lotte, Katzen Rudi & Timmy). Sandra hat ein Atelier.
Morgenablauf: Euthyrox + Rückenübungen im Bett, dann Rudi Magenschutz, Blutdruck, wiegen, Schiene, Wasser, Tee, Frühstück mit Medikamenten, Katzen, Bad Früh, Lotte raus, Tiermedikamente, Atelier.
Gib einen kurzen persönlichen Fokus-Impuls: 2–4 Sätze, deutsch. Ton: ruhig, direkt, wie eine kluge Freundin. Kein "Ich wünsche dir". Einen konkreten Ankersatz mitgeben.`,
        messages:[{ role:'user', content:`Heute liegt mir am Herzen: "${input}"\nRoutine: ${pct}% – erledigt: ${donenames}.\nNoch offen: ${offen}.` }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(b=>b.type==='text')?.text || '–';
    result.className = 'fokus-result visible';
    result.textContent = text;
  } catch {
    result.className = 'fokus-result visible';
    result.textContent = 'Keine Verbindung – schreib deinen Fokus einfach selbst hier hinein. ✦';
  }
  btn.disabled = false;
}

document.getElementById('fokusInput').addEventListener('keydown', e => { if (e.key==='Enter') getFokus(); });
render();
</script>
</body>
</html>
